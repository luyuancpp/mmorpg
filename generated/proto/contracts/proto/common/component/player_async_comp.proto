syntax = "proto3";
option go_package = "contracts/proto/common/component";



message PlayerGameNodeEntryInfoComp
{
  uint32 centre_node_id = 1;   // deprecated
  uint64 session_id = 2;
  uint32 enter_gs_type = 3;    // LOGIN_FIRST / LOGIN_RECONNECT / LOGIN_REPLACE
  uint64 scene_id = 4;         // Target scene instance GUID from SceneManager
}
