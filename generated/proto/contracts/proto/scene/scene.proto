syntax = "proto3";
option go_package = "contracts/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/base/empty.proto";
import "proto/common/base/common.proto";
import "proto/common/base/message.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;

message PlayerEnterGameNodeRequest
{
  uint64 player_id = 1;
  uint64 session_id = 2;
  uint32 centre_node_id = 3;   // deprecated
  uint32 enter_gs_type = 4;    // LOGIN_FIRST / LOGIN_RECONNECT / LOGIN_REPLACE
  uint64 scene_id = 5;         // Target scene instance GUID from SceneManager
}

message ProcessClientPlayerMessageRequest
{
  MessageContent message_content = 1;
  uint64 session_id = 2;
}

message ProcessClientPlayerMessageResponse
{
  MessageContent message_content = 1;
  uint64 session_id = 2;
}

message SessionDisconnectRequest
{
  uint64 player_id = 1;
}

message GameNodeConnectRequest
{
  NetworkAddress rpc_client = 1;
  uint32 gate_node_id = 2;
}

message RegisterPlayerSessionRequest
{
  uint64 session_id = 1;
  uint64 player_id = 2;
}

message Centre2GsEnterSceneRequest
{
  uint64 player_id = 1;
  uint64 scene_id = 2;
}

message CreateSceneRequest
{
  uint32 config_id = 1;
  uint64 scene_id = 2;  // Go-allocated scene ID; C++ dedup by this when > 0.
}

message CreateSceneResponse
{
  SceneInfoComp scene_info = 1;
}

message DestroySceneRequest
{
  uint64 scene_id = 1;
}

service Scene {
  rpc PlayerEnterGameNode (PlayerEnterGameNodeRequest) returns (Empty);
  rpc SendMessageToPlayer (NodeRouteMessageRequest) returns (NodeRouteMessageResponse);
  rpc ProcessClientPlayerMessage (ProcessClientPlayerMessageRequest) returns (ProcessClientPlayerMessageResponse);
  rpc CentreSendToPlayerViaGameNode (NodeRouteMessageRequest) returns (Empty);
  rpc InvokePlayerService (NodeRouteMessageRequest) returns (NodeRouteMessageResponse);
  rpc RouteNodeStringMsg (RouteMessageRequest) returns (RouteMessageResponse);
  rpc RoutePlayerStringMsg (RoutePlayerMessageRequest) returns (RoutePlayerMessageResponse) {
    option (OptionMessagePriority) = MESSAGE_PRIORITY_IMPORTANT;
  }
  rpc UpdateSessionDetail (RegisterPlayerSessionRequest) returns (Empty);
  rpc EnterScene (Centre2GsEnterSceneRequest) returns (Empty);
  rpc CreateScene (CreateSceneRequest) returns (CreateSceneResponse);
  rpc DestroyScene (DestroySceneRequest) returns (Empty);
  rpc NodeHandshake(NodeHandshakeRequest) returns (NodeHandshakeResponse);
}
