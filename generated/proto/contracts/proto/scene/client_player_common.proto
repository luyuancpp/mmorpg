syntax = "proto3";
option go_package = "contracts/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/base/empty.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;


message GameKickPlayerRequest {
  TipInfoMessage reason = 1;
  string operator = 2;
}

// Server tells client to disconnect and reconnect to a different Gate (cross-zone transition).
message RedirectToGateNotify {
  string target_ip = 1;
  uint32 target_port = 2;
  bytes  token_payload = 3;    // serialized GateTokenPayload for target gate
  bytes  token_signature = 4;  // HMAC-SHA256 signature
  int64  token_deadline = 5;   // unix seconds
}

service SceneClientPlayerCommon 
{
  option (OptionIsPlayerService) = true;
  option (OptionIsClientProtocolService) = true;
  
  rpc SendTipToClient (TipInfoMessage) returns (Empty);
  rpc KickPlayer (GameKickPlayerRequest) returns (Empty);
  rpc RedirectToGate (RedirectToGateNotify) returns (Empty);
}
