syntax = "proto3";
option go_package = "proto/common/rollback";

// What triggered the snapshot.
enum SnapshotTrigger
{
  SNAPSHOT_UNKNOWN = 0;
  SNAPSHOT_LOGIN = 1;            // Taken at login (after data loaded)
  SNAPSHOT_LOGOUT = 2;           // Taken at logout (before data saved)
  SNAPSHOT_PERIODIC = 3;         // Timer-driven periodic snapshot
  SNAPSHOT_PRE_TRADE = 4;        // Before a significant trade/exchange
  SNAPSHOT_PRE_MAINTENANCE = 5;  // Before scheduled server maintenance
  SNAPSHOT_GM_MANUAL = 6;        // GM manually requested
}

// A complete serialized snapshot of one player's state at a point in time.
// Stored in a dedicated table, isolated from live data.
message PlayerSnapshotEntry
{
  uint64 snapshot_id = 1;          // Unique ID (SnowFlake)
  uint64 player_id = 2;
  uint64 snapshot_time = 3;        // Unix seconds when snapshot was taken
  SnapshotTrigger trigger = 4;

  // Serialized player_database protobuf bytes (important data: currency, skills, etc.)
  bytes player_database_blob = 5;
  // Serialized player_database_1 protobuf bytes (less important data)
  bytes player_database_1_blob = 6;

  // Version tag — helps detect schema migration issues during restore.
  string schema_version = 7;

  // Snapshot size in bytes (for monitoring / retention policies).
  uint64 total_bytes = 8;
}

// Query helpers ---------------------------------------------------------------

message ListSnapshotsRequest
{
  uint64 player_id = 1;
  uint64 time_start = 2;          // Unix seconds, inclusive
  uint64 time_end = 3;            // Unix seconds, inclusive; 0 = now
  uint32 limit = 4;               // Max results to return; 0 = server default
}

message ListSnapshotsResponse
{
  repeated PlayerSnapshotEntry snapshots = 1;
}

// Diff between snapshot and current live state (computed server-side).
message SnapshotDiffItem
{
  uint64 item_uuid = 1;
  uint32 item_config_id = 2;
  int32 quantity_diff = 3;         // Positive = missing vs snapshot; negative = gained since snapshot
  bool has_transfer_record = 4;    // True if transaction_log shows a normal transfer for this item
  bool restorable = 5;             // True if safe to restore (no transfer record)
}

message SnapshotDiffCurrency
{
  uint32 currency_type = 1;
  int64 delta = 2;                 // snapshot_balance - current_balance
  bool has_transfer_record = 3;
  bool restorable = 4;
}

message SnapshotDiff
{
  uint64 snapshot_id = 1;
  uint64 player_id = 2;
  repeated SnapshotDiffItem items = 3;
  repeated SnapshotDiffCurrency currencies = 4;
}
