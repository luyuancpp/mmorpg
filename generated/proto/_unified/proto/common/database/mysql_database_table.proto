syntax = "proto3";
option go_package = "proto/common/database";

import "proto/db/proto_option.proto";
import "proto/common/base/user_accounts.proto";
import "proto/common/component/player_scene_comp.proto";
import "proto/common/component/actor_comp.proto";
import "proto/common/component/player_comp.proto";
import "proto/common/component/player_skill_comp.proto";
import "proto/common/component/currency_comp.proto";

// ------------------- User basic info table -------------------
message user
{
  option(OptionTableName) = "user";
  option(OptionPrimaryKey) = "id";
  option(OptionIndex) = "last_login";  // Index on last_login

  uint64 id = 1;                 // Globally unique user ID
  string display_name = 2;       // Nickname, may be empty
  bool is_guest = 3;             // Whether guest
  uint64 create_time = 4;        // Creation timestamp
  uint64 last_login = 5;         // Last login timestamp
}

// ------------------- Third-party OAuth binding table -------------------
message user_oauth
{
  option(OptionTableName) = "user_oauth";
  option(OptionPrimaryKey) = "user_id,provider";           // PK = user_id + provider
  option(OptionUniqueKey) = "provider,provider_id";       // UNIQUE(provider, provider_id)

  uint64 user_id = 1;           // FK -> user.id
  string provider = 2;          // weixin/google/apple/qq
  string provider_id = 3;       // openid/sub
  uint64 create_time = 4;       // Creation timestamp
}

// ------------------- Phone binding table -------------------
message user_phone
{
  option(OptionTableName) = "user_phone";
  option(OptionPrimaryKey) = "user_id";                   // One record per user
  option(OptionUniqueKey) = "phone";                      // UNIQUE(phone)

  uint64 user_id = 1;           // FK -> user.id
  string phone = 2;             // Phone number
  uint64 create_time = 3;       // Creation timestamp
}

// ------------------- Password table -------------------
message user_password
{
  option(OptionTableName) = "user_password";
  option(OptionPrimaryKey) = "user_id";

  uint64 user_id = 1;           // FK -> user.id
  string hash = 2;              // Password hash
  uint64 create_time = 3;       // Creation timestamp
}

message user_accounts
{
  option(OptionTableName) = "user_accounts";
  option(OptionPrimaryKey) = "account";
  string account = 1;
  string password = 2;
  AccountSimplePlayerList simple_players = 3;
}

message account_share_database
{
  option(OptionTableName) = "account_share_database";
  option(OptionPrimaryKey) = "account";
  string account = 1;
}

// Centre-specific player data
message player_centre_database
{
  option(OptionTableName) = "player_centre_database";
  option(OptionPrimaryKey) = "player_id";
  option(OptionAutoIncrementKey) = "player_id";
  uint64 player_id = 1;
  PlayerSceneContextComp scene_info = 2;
}

// Player database table 1: important data here, less important in another table
// (important = money, revenue-related); loaded immediately on login
message player_database
{
  option(OptionTableName) = "player_database";
  option(OptionPrimaryKey) = "player_id";
  option(OptionAutoIncrementKey) = "player_id";
  option (OptionIsPlayerDatabase) = true;
  uint64 player_id = 1;
  Transform transform = 2;
  PlayerUint64Comp uint64_pb_component = 3;
  PlayerSkillListComp skill_list = 4;
  PlayerUint32Comp uint32_pb_component = 5;
  BaseAttributesComp derived_attributes_component = 6;
  LevelComp level_component = 7;
  CurrencyComp currency = 8;
}

message player_database_1
{
  option(OptionTableName) = "player_database_1";
  option(OptionPrimaryKey) = "player_id";
  option(OptionAutoIncrementKey) = "player_id";
  option (OptionIsPlayerDatabase) = true;
  uint64 player_id = 1;
}

