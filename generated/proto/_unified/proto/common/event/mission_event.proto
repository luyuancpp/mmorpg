syntax = "proto3";
option go_package = "proto/common/event";



message AcceptMissionEvent
{
  uint64 entity = 1;
  uint32 mission_id = 2;
}

message ConditionEvent
{
  uint64 entity = 1;
  uint32 condition_type = 2;
  repeated uint32 condition_ids = 3;
  uint32 amount = 4;
}

message OnAcceptedMissionEvent
{
  uint64 entity = 1;
  uint32 mission_id = 2;
}

message OnMissionAwardEvent
{
  uint64 entity = 1;
  uint32 mission_id = 2;
}
