syntax = "proto3";

option go_package = "proto/login";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/base/user_accounts.proto";
import "proto/common/base/common.proto";

package loginpb;

message LoginSessionInfo {
  string account = 1;
  uint64 role_id = 2;
  uint32 session_id = 3;
  uint64 gate_id = 4;
  string device_id = 5;
  int64 login_time = 6;
}

message AccountSimplePlayerWrapper
{
  AccountSimplePlayer player = 1;
}

message LoginRequest
{
  string account = 1;
  string password = 2;
  string auth_type = 3;   // Auth provider type: "password" (default), "wechat", "qq", "netease", "satoken"
  string auth_token = 4;  // Third-party auth code/token (used when auth_type is not "password")
}

message LoginResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
  string access_token = 3;           // Opaque access token (2h TTL), use as auth_type="access_token" for reconnect
  string refresh_token = 4;          // Opaque refresh token (30d TTL), use RefreshToken RPC to renew
  int64 access_token_expire = 5;     // Unix seconds when access_token expires
  int64 refresh_token_expire = 6;    // Unix seconds when refresh_token expires
}

message TestResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
  repeated string teststring = 3;
  repeated int32 testint = 4;
}

message CreatePlayerRequest
{
}

message CreatePlayerResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
}

message EnterGameRequest
{
  uint64 player_id  = 1;

  // Client-generated idempotent request ID (must reuse for retries of the same request)
  string request_id = 2;
}

message EnterGameResponse
{
  TipInfoMessage error_message = 1;
  uint64 player_id  = 2;

  // ─── Post-merge one-shot signals (server-merge-gap-fixes.md §1 / §5) ───
  //
  // These two fields are non-zero **only on the first successful EnterGame
  // after a server merge**. They drive client UI:
  //
  //   • post_merge_notice_ts > 0  →  client SHOULD show a one-shot
  //     "Your zone was merged into <new_zone_name> on <date>" notice.
  //     The timestamp is the merge wall-clock millis (set by
  //     tools/merge_zone/post_merge_stamp.go), useful for the notice
  //     copy. Login server clears the underlying Redis flag before
  //     returning, so the value is non-zero exactly once per merge.
  //
  //   • force_rename_required = true  →  client MUST show a forced-rename
  //     UI before letting the player into the world. Set when the
  //     player's name collided with an existing name in the merge
  //     target zone.
  //
  //     2026-05-23 reality note: this project has no player nickname
  //     field today (CreatePlayer is empty; user.display_name is unused;
  //     no rename RPC exists). The flag is pre-wired so that when a
  //     nickname surface lands, the merge tool can already stamp it
  //     and login can already deliver it without re-doing protocol.
  //     The eventual rename RPC will be responsible for DELeting the
  //     `player_force_rename:{player_id}` Redis key on a successful
  //     rename — login does NOT clear it on EnterGame because the
  //     client could otherwise dismiss the rename UI and lose the
  //     gate (see go/login/.../entergamelogic.go::consumePostMergeFlags).
  //
  // Wire compat: pre-this-field clients ignore both — they still enter
  // the game; they just don't see the notice / rename UI. That's fine
  // for staged rollout: server starts populating the fields whenever
  // the post_merge_stamp lands, no client gate needed.
  int64 post_merge_notice_ts    = 3;
  bool  force_rename_required   = 4;
}

message LeaveGameRequest
{
}

message LoginNodeDisconnectRequest
{
  uint32 session_id = 1;
}

message LoginEmptyResponse
{
}

message RefreshTokenRequest
{
  string refresh_token = 1;  // Current refresh token
}

message RefreshTokenResponse
{
  TipInfoMessage error_message = 1;
  string access_token = 2;           // New access token
  string refresh_token = 3;          // Rotated refresh token (old one is invalidated)
  int64 access_token_expire = 4;     // Unix seconds when new access_token expires
  int64 refresh_token_expire = 5;    // Unix seconds when new refresh_token expires
}

service ClientPlayerLogin  {
  option (OptionIsClientProtocolService) = true;

  rpc Login (LoginRequest) returns (LoginResponse);
  rpc CreatePlayer (CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc EnterGame (EnterGameRequest) returns (EnterGameResponse);
  rpc LeaveGame (LeaveGameRequest) returns (LoginEmptyResponse);
  rpc Disconnect (LoginNodeDisconnectRequest) returns (LoginEmptyResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
}

// ── Pre-connection RPCs (called before connecting to Gate) ──────

message AssignGateRequest {
  uint32 zone_id = 1;
  // Re-entry by a client already in the queue: server validates the token,
  // skips capacity check, and returns the current rank (or admit token if
  // dispatcher already promoted this entry). Empty on first call.
  string queue_token = 2;
  // Optional account/device for reconnect-exemption. When server sees an
  // existing PlayerSession for this account on a live gate, it bypasses
  // the queue and returns a fresh gate token bound to that gate.
  string account = 3;
  string device_id = 4;
}

// AssignGateStatus mirrors AssignGateResponse.status / QueryQueueStatusResponse.status.
// Kept as raw uint32 in the messages for lite-runtime compatibility, documented here.
//   0 = ADMITTED  (gate token populated; client connects to gate)
//   1 = QUEUEING  (queue_token + queue_rank populated; client polls QueryQueueStatus)
//   2 = ERROR     (error field populated)
//   3 = EXPIRED   (queue_token expired or unknown — client must restart from /assign-gate)

message AssignGateResponse {
  string ip = 1;
  uint32 port = 2;
  bytes token_payload = 3;    // serialized GateTokenPayload — pass to ClientTokenVerifyRequest.payload
  bytes token_signature = 4;  // HMAC-SHA256 signature — pass to ClientTokenVerifyRequest.signature
  int64 token_deadline = 5;   // unix seconds when token expires (informational for client)
  string error = 6;           // non-empty on failure (no gate available, etc.)

  // Queue protocol (added 2026-05). status=0 means the legacy fields above
  // are populated and the client connects directly. status=1 means the client
  // is in the queue and must poll QueryQueueStatus.
  uint32 status = 7;
  string queue_token = 8;     // opaque token, present when status=1
  uint32 queue_rank = 9;      // 0-based position; 0 = "you are next"
  uint32 queue_total = 10;    // total queue length for this zone (for UI)
  uint32 retry_after_ms = 11; // suggested poll interval (e.g. 2000)
}

message QueryQueueStatusRequest {
  string queue_token = 1;
}

message QueryQueueStatusResponse {
  uint32 status = 1;          // 0=ADMITTED, 1=QUEUEING, 3=EXPIRED
  // status=0: gate token (same shape as AssignGateResponse)
  string ip = 2;
  uint32 port = 3;
  bytes token_payload = 4;
  bytes token_signature = 5;
  int64 token_deadline = 6;
  // status=1
  uint32 queue_rank = 7;
  uint32 queue_total = 8;
  uint32 retry_after_ms = 9;
  // status=3 or any error
  string error = 10;
}

service LoginPreGate {
  // Login picks the least-loaded Gate for the given zone, signs a one-time
  // HMAC token. Client TCP-connects to the assigned gate and sends the
  // token as a ClientTokenVerifyRequest (first message after connect).
  //
  // When the zone is over capacity, AssignGate enqueues the caller and
  // returns status=QUEUEING with a queue_token. The client then polls
  // QueryQueueStatus until it receives a gate token.
  rpc AssignGate (AssignGateRequest) returns (AssignGateResponse);
  rpc QueryQueueStatus (QueryQueueStatusRequest) returns (QueryQueueStatusResponse);
}

// ── Admin-only RPCs (internal, not client-facing) ──────────────

message RemovePlayersFromAccountsRequest {
  repeated uint64 player_ids = 1; // orphan player IDs to remove from their accounts
}

message RemovePlayersFromAccountsResponse {
  uint32 removed_count = 1;    // players successfully removed from accounts
  uint32 not_found_count = 2;  // players whose reverse mapping was missing
  uint32 failed_count = 3;     // players that failed to remove
}

service LoginAdmin {
  // Remove orphan characters from their accounts' SimplePlayers lists.
  // Called by admin tools after zone rollback to clean up orphan characters.
  // Uses player_to_account:{player_id} reverse mapping to find the owning account.
  rpc RemovePlayersFromAccounts (RemovePlayersFromAccountsRequest) returns (RemovePlayersFromAccountsResponse);
}
