syntax = "proto3";
option go_package = "scene_manager/proto/common/event";




message CombatStateAddedEvent 
{
    uint64 actor_entity = 1;
    uint64 source_buff_id = 2;
	uint32 state_type = 3;
}

message CombatStateRemovedEvent 
{
    uint64 actor_entity = 1;
    uint64 source_buff_id = 2;
	uint32 state_type = 3;
}
