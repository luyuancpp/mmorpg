syntax = "proto3";
option go_package = "scene_manager/proto/common/base";



message SessionDetails
{
  uint64 session_id = 1;
  uint64 player_id = 2;
  uint32 gate_node_id = 3;      // Gate node ID (for Kafka routing)
  string gate_instance_id = 4;  // Gate startup UUID (zombie-message protection)
}
