syntax = "proto3";
option go_package = "scene_manager/proto/scene";

import "proto/db/proto_option.proto";
import "google/protobuf/empty.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;

message GateLoginNotifyRequest
{
  uint32 enter_gs_type = 1;
}

message GameNodeExitGameRequest
{
}

service ScenePlayer
{
  option (OptionIsPlayerService) = true;
  rpc GateLoginNotify (GateLoginNotifyRequest) returns (google.protobuf.Empty);
  rpc ExitGame (GameNodeExitGameRequest) returns (google.protobuf.Empty);
}
