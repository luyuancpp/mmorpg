syntax = "proto3";
option go_package = "scene_manager/proto/slg";

import "proto/db/proto_option.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SLG_MAP;

// ============================================================================
// Battle Messages
// ============================================================================

message ArmySnapshot {
  uint64 player_id           = 1;
  uint64 army_id             = 2;
  repeated GeneralSnapshot generals = 3;
  uint32 troop_count         = 4;
  uint32 troop_type          = 5;
}

message GeneralSnapshot {
  uint32 general_id    = 1;
  uint32 level         = 2;
  int32  hp            = 3;
  int32  atk           = 4;
  int32  def           = 5;
  int32  spd           = 6;
  repeated uint32 skill_ids = 7;
}

message BuffEvent {
  uint32 buff_id   = 1;
  uint32 target    = 2;
  bool   is_add    = 3;
  int32  remaining = 4;
}

enum BattleActionType {
  ACTION_UNKNOWN       = 0;
  ACTION_NORMAL_ATTACK = 1;
  ACTION_SKILL         = 2;
  ACTION_BUFF          = 3;
  ACTION_DEBUFF        = 4;
  ACTION_HEAL          = 5;
  ACTION_DEATH         = 6;
}

message BattleAction {
  BattleActionType type  = 1;
  uint32 source_slot     = 2;
  uint32 target_slot     = 3;
  uint32 skill_id        = 4;
  int32  damage          = 5;
  int32  source_hp_after = 6;
  int32  target_hp_after = 7;
  repeated BuffEvent buffs = 8;
  bool   is_critical     = 9;
  bool   is_dodged       = 10;
}

message BattleRound {
  uint32 round_number          = 1;
  repeated BattleAction actions = 2;
}

enum BattleResultType {
  BATTLE_RESULT_UNKNOWN   = 0;
  BATTLE_RESULT_ATTACKER_WIN = 1;
  BATTLE_RESULT_DEFENDER_WIN = 2;
  BATTLE_RESULT_DRAW      = 3;
}

message BattleResult {
  BattleResultType winner     = 1;
  uint32 attacker_casualties  = 2;
  uint32 defender_casualties  = 3;
}

message BattleReport {
  uint64 battle_id             = 1;
  uint64 random_seed           = 2;
  ArmySnapshot attacker        = 3;
  ArmySnapshot defender        = 4;
  repeated BattleRound rounds  = 5;
  BattleResult result          = 6;
  uint32 checksum              = 7;
  int64  battle_time           = 8;
}

// ============================================================================
// Battle Service (stateless worker)
// ============================================================================

message SimulateBattleRequest {
  ArmySnapshot attacker   = 1;
  ArmySnapshot defender   = 2;
  uint64 random_seed      = 3;
  uint32 terrain_type     = 4;
}

message SimulateBattleResponse {
  BattleReport report = 1;
}

message QueryBattleReportRequest {
  uint64 battle_id = 1;
}

message QueryBattleReportResponse {
  BattleReport report = 1;
}

service SlgBattle {
  rpc SimulateBattle (SimulateBattleRequest) returns (SimulateBattleResponse);
  rpc QueryBattleReport (QueryBattleReportRequest) returns (QueryBattleReportResponse);
}
