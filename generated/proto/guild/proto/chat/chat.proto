syntax = "proto3";
option go_package = "guild/proto/chat";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";

package chatpb;

option cc_generic_services = false;
option (OptionFileDefaultNode) = NODE_CHAT;

enum ChatChannelType {
  CHAT_CHANNEL_TYPE_UNSPECIFIED = 0;
  CHAT_CHANNEL_TYPE_WORLD = 1;
  CHAT_CHANNEL_TYPE_TEAM = 2;
  CHAT_CHANNEL_TYPE_PRIVATE = 3;
  CHAT_CHANNEL_TYPE_SYSTEM = 4;
}

message ChatMessage {
  uint64 sender_player_id = 1;
  uint64 target_player_id = 2;
  ChatChannelType channel = 3;
  string content = 4;
  int64 send_time_ms = 5;
}

message SendChatRequest {
  ChatMessage message = 1;
  string request_id = 2;
}

message SendChatResponse {
  TipInfoMessage error_message = 1;
}

message PullChatHistoryRequest {
  ChatChannelType channel = 1;
  uint64 peer_player_id = 2;
  uint32 limit = 3;
}

message PullChatHistoryResponse {
  TipInfoMessage error_message = 1;
  repeated ChatMessage messages = 2;
}

service ClientPlayerChat {
  option (OptionIsClientProtocolService) = true;

  rpc SendChat (SendChatRequest) returns (SendChatResponse);
  rpc PullChatHistory (PullChatHistoryRequest) returns (PullChatHistoryResponse);
}
