syntax = "proto3";

option go_package = "etcd/proto/player_locator";

package playerlocator;

import "proto/common/base/empty.proto";

// Player location
message PlayerLocation {
  int64 uid = 1;
  string server_id = 2;
  bool online = 3;
  bool migrating = 4;
  int32 scene_id = 5;
  string token = 6;
  int64 ts = 7;
}

message PlayerId {
  int64 uid = 1;
}

// ----- Session management (replaces Centre SessionMap) -----

enum PlayerSessionState {
  SESSION_STATE_UNKNOWN = 0;
  SESSION_STATE_ONLINE = 1;          // Online
  SESSION_STATE_DISCONNECTING = 2;   // Disconnecting, waiting for reconnect (30s lease)
  SESSION_STATE_OFFLINE = 3;         // Offline
}

message PlayerSession {
  uint64 player_id = 1;
  uint64 session_id = 2;         // Gate session ID
  string gate_id = 3;            // Gate node ID
  string gate_instance_id = 4;   // Gate instance UUID (prevent zombie messages)
  string scene_node_id = 5;      // Current Scene node ID
  uint64 scene_id = 6;           // Current scene ID
  string token_id = 7;           // SHA256(login_token)
  uint64 token_expiry_ms = 8;
  uint64 session_version = 9;    // Incremented on each real change, prevents stale messages
  PlayerSessionState state = 10;
  int64 last_active_ts = 11;     // Last active time (unix ms)
  string request_id = 12;        // Latest login request_id (idempotent)
  string account = 13;           // Account name (used by Login for reconnect decisions)
}

message SetSessionRequest {
  PlayerSession session = 1;
}

message GetSessionRequest {
  uint64 player_id = 1;
}

message GetSessionResponse {
  PlayerSession session = 1;
  bool found = 2;
}

// Disconnect request: mark DISCONNECTING + start TTL lease
message SetDisconnectingRequest {
  uint64 player_id = 1;
  uint64 session_id = 2;
  uint32 lease_ttl_seconds = 3;  // Default 30s
}

// Reconnect request: cancel lease, restore ONLINE
message ReconnectRequest {
  uint64 player_id = 1;
  uint64 new_session_id = 2;
  string gate_id = 3;
  string gate_instance_id = 4;
  string token_id = 5;
  uint64 token_expiry_ms = 6;
  string request_id = 7;
  string account = 8;           // Account name (from Login)
}

message ReconnectResponse {
  bool success = 1;
  PlayerSession session = 2;  // Updated session
  string error_message = 3;
}

// Lease expired cleanup result
message LeaseExpiredEvent {
  uint64 player_id = 1;
  uint64 session_id = 2;
  string scene_node_id = 3;
  uint64 scene_id = 4;
  string gate_id = 5;
  string gate_instance_id = 6;
}

service PlayerLocator {
  rpc SetLocation(PlayerLocation) returns (Empty);
  rpc GetLocation(PlayerId) returns (PlayerLocation);
  rpc MarkOffline(PlayerId) returns (Empty);

  // Session management (replaces Centre)
  rpc SetSession(SetSessionRequest) returns (Empty);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc SetDisconnecting(SetDisconnectingRequest) returns (Empty);
  rpc Reconnect(ReconnectRequest) returns (ReconnectResponse);
}
