syntax = "proto3";
option go_package = "chat/proto/common/event";



message OnNodeAddEvent {
  uint64 entity = 1;
  uint32 node_type = 2;
  uint32 scenenode_type = 3;
}

message OnNodeRemoveEvent {
  uint64 entity = 1;
  uint32 node_type = 2;
  uint32 scene_node_type = 3;
}

message ConnectToNodeEvent {
  uint32 entity = 1;
  uint32 node_type = 2;
}

message OnNodeConnectedEvent {

}
