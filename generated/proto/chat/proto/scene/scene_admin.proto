syntax = "proto3";
option go_package = "chat/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/base/empty.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;


message GameSceneTest
{
}


// Normal or session-takeover enter scene
// Reconnect enter scene (time-dependent)
service SceneScene
{
  rpc Test (GameSceneTest) returns (Empty);
}
