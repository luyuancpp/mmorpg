syntax = "proto3";
option go_package = "chat/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/component/actor_comp.proto";
import "proto/common/base/empty.proto";
import "proto/common/component/actor_attribute_state_comp.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;


// Message for syncing entity base attribute deltas
message ActorBaseAttributesS2C   
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  Transform transform = 2;  // Transform info
  Velocity velocity = 3;
  CombatStateFlagsComp combat_state_flags = 4;// Combat state
}

// Frame-rate sync messages
message AttributeDelta2FramesS2C 
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  // Additional attributes can be added here
}

message AttributeDelta5FramesS2C 
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  // Additional attributes can be added here
}

message AttributeDelta10FramesS2C 
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  // Additional attributes can be added here
}

message AttributeDelta30FramesS2C 
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  // Additional attributes can be added here
}

message AttributeDelta60FramesS2C 
{
  option (OptionAttributeSync) = true;

  uint64 entity_id = 1;  // Entity unique ID
  // Additional attributes can be added here
}

// Service for entity attribute sync
service ScenePlayerSync
{
  option (OptionIsPlayerService) = true;

  rpc SyncBaseAttribute (ActorBaseAttributesS2C) returns (Empty); 
  rpc SyncAttribute2Frames (AttributeDelta2FramesS2C) returns (Empty);  
  rpc SyncAttribute5Frames (AttributeDelta5FramesS2C) returns (Empty);  
  rpc SyncAttribute10Frames (AttributeDelta10FramesS2C) returns (Empty); 
  rpc SyncAttribute30Frames (AttributeDelta30FramesS2C) returns (Empty); 
  rpc SyncAttribute60Frames (AttributeDelta60FramesS2C) returns (Empty); 
}
