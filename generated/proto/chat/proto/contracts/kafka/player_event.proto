syntax = "proto3";
package contracts.kafka;

option go_package = "chat/proto/contracts/kafka";

// Transport contract for player lifecycle events.
// Topic: "player-events" (consumed by player_locator).
message PlayerLifecycleCommand {
  enum CommandType {
    Disconnected = 0;   // Gate reports TCP disconnect
    LeaseExpired = 1;   // player_locator: lease expired, trigger cleanup
  }

  CommandType command_type = 1;
  uint64 player_id = 2;
  uint64 session_id = 3;
  string gate_id = 4;
  string gate_instance_id = 5;
  bytes payload = 6;
}
