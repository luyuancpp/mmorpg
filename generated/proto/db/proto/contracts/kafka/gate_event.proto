syntax = "proto3";
package contracts.kafka;

option go_package = "db/proto/contracts/kafka";

import "proto/common/base/message.proto";

// In-process events decoded from Gate Kafka transport payloads.
// These are intentionally modeled like node event protos so handlers can stay split by file/domain.
message RoutePlayerEvent {
  uint32 session_id = 1;
  uint32 target_node_id = 2;
  uint64 scene_id = 3;        // Scene instance GUID allocated by SceneManager
  uint64 player_id = 4;
}

message KickPlayerEvent {
  uint32 session_id = 1;
}

// Sent by Gate when a player TCP connection drops.
// Consumed by player_locator to start disconnect lease.
message PlayerDisconnectedEvent {
  uint32 session_id = 1;
  uint64 player_id = 2;
  string gate_id = 3;
  string gate_instance_id = 4;
}

// Published by player_locator when disconnect lease expires (player didn't reconnect).
// Consumed by Scene to clean up player entity, and Gate to clean up stale session.
message PlayerLeaseExpiredEvent {
  uint64 player_id = 1;
  uint32 session_id = 2;
  string scene_node_id = 3;
  uint64 scene_id = 4;
  string gate_id = 5;
  string gate_instance_id = 6;
}

// Sent by Login/player_locator to bind a session to Gate.
message BindSessionEvent {
  uint32 session_id = 1;
  uint64 player_id = 2;
  uint32 session_version = 3;
  uint32 enter_gs_type = 4;  // LOGIN_FIRST / LOGIN_RECONNECT / LOGIN_REPLACE
}

// Sent by SceneManager to Gate when a player requests a cross-zone scene.
// Gate forwards the redirect info to the client so it can reconnect to the target zone's Gate.
message RedirectToGateEvent {
  uint64 player_id = 1;
  uint32 session_id = 2;
  string target_gate_ip = 3;
  uint32 target_gate_port = 4;
  bytes  token_payload = 5;    // serialized GateTokenPayload for target gate
  bytes  token_signature = 6;  // HMAC-SHA256 signature
  int64  token_deadline = 7;   // unix seconds
}

// Go service pushes a single message to a player's client via Gate.
// Flow: Go service -> Kafka gate-{gate_id} -> Gate -> client TCP
message PushToPlayerEvent {
  uint32 session_id = 1;
  MessageContent message_content = 2;
}

// Go service broadcasts the same message to multiple players on the same Gate.
// Sender groups players by gate_id and sends one Kafka message per Gate.
// Flow: Go service -> Kafka gate-{gate_id} -> Gate -> N client TCP connections
message BroadcastToPlayersEvent {
  repeated uint32 session_list = 1;
  MessageContent message_content = 2;
}
