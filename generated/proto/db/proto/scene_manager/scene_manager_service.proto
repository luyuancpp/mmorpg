syntax = "proto3";
package scene_manager;

import "proto/common/base/node.proto";
import "proto/common/base/empty.proto";
import "proto/contracts/kafka/gate_command.proto";

option go_package = "db/proto/scene_manager";

// Scene type: main world (persistent) vs instance (on-demand, has lifecycle).
enum SceneType {
  SCENE_TYPE_UNSPECIFIED = 0;
  // Persistent main-world scene. Created at startup, never auto-destroyed.
  SCENE_TYPE_MAIN_WORLD  = 1;
  // On-demand instance (dungeon, arena, etc.). Created per request, auto-destroyed when idle.
  SCENE_TYPE_INSTANCE    = 2;
}

// SceneManager Service: Responsible for scene creation/destruction and player-scene routing.
// No longer requires Centre — Login/player_locator drive the flow directly.
service SceneManager {
  // Create a scene on a specific node (implemented by the Scene node)
  rpc CreateScene(CreateSceneRequest) returns (CreateSceneResponse) {}

  // Destroy a scene
  rpc DestroyScene(DestroySceneRequest) returns (Empty) {}

  // Login/player_locator requests a player to enter a scene
  rpc EnterScene(EnterSceneRequest) returns (EnterSceneResponse) {}

  // Login/player_locator requests a player to leave a scene
  rpc LeaveScene(LeaveSceneRequest) returns (Empty) {}
}

message CreateSceneRequest {
  // Scene config ID (map template)
  uint64 scene_conf_id = 1;
  // Optional: Specify creation on a specific Scene node (used for main world hash assignment)
  string target_node_id = 2;
  // Scene type. Main world scenes are persistent; instances have lifecycle management.
  SceneType scene_type = 3;
  // Creator player IDs (for instance access control)
  repeated uint64 creator_ids = 4;
  // Zone ID: which zone this scene belongs to.
  uint32 zone_id = 5;
}

message CreateSceneResponse {
  // Global scene ID (allocated by SceneManager)
  uint64 scene_id = 1;
  // ID of the node where it resides
  string node_id = 2;
  // Creation result: 0 for success, non-zero for error code
  uint32 error_code = 3;
  string error_message = 4;
}

message DestroySceneRequest {
  uint64 scene_id = 1;
  // Zone ID: which zone this scene belongs to.
  uint32 zone_id = 2;
}

message EnterSceneRequest {
  uint64 player_id = 1;
  uint64 scene_id = 2;          // Target scene (if known). 0 = allocate via scene_conf_id.
  uint64 session_id = 3;        // Gate session ID
  string request_id = 4;        // Idempotency ID (optional)
  string gate_id = 5;           // Gate Node ID
  string gate_instance_id = 6;  // Gate Instance ID (for Kafka message validation)
  // Zone ID: which zone the target scene belongs to.
  uint32 zone_id = 7;
  // Scene config ID (map template). Required when scene_id == 0.
  // Used to resolve the actual scene instance from main_scene_channels.
  uint64 scene_conf_id = 8;
  // Zone ID of the player's current Gate. Used to detect cross-zone transitions.
  uint32 gate_zone_id = 9;
}

message EnterSceneResponse {
  uint32 error_code = 1;
  string error_message = 2;
  // Non-empty when cross-zone redirect is needed instead of direct routing.
  // Client should disconnect from current Gate and reconnect to the target Gate.
  RedirectToGateInfo redirect = 3;
}

// Redirect info returned when player needs to switch to a different zone's Gate.
message RedirectToGateInfo {
  string target_gate_ip = 1;
  uint32 target_gate_port = 2;
  bytes  token_payload = 3;    // serialized GateTokenPayload for target gate
  bytes  token_signature = 4;  // HMAC-SHA256 signature
  int64  token_deadline = 5;   // unix seconds
}

message LeaveSceneRequest {
  uint64 player_id = 1;
  uint64 scene_id = 2;
  string request_id = 3;
  // Zone ID: which zone the target scene belongs to.
  uint32 zone_id = 4;
}
