syntax = "proto3";
option go_package = "db/proto/common/component";


import "proto/common/component/comp.proto";

message Location
{
	double x = 1;
	double y = 2;
	double z = 3;
}

message Rotation
{
	double x = 1;
	double y = 2;
	double z = 3;
}

message Scale
{
	double x = 1;
	double y = 2;
	double z = 3;
}

message Transform
{
	Vector3 location = 1;
	Rotation rotation = 2;
	Scale scale = 3;
}

message Velocity
{
	double x = 1;
	double y = 2;
	double z = 3;
}


message Acceleration 
{
	double x = 1;
	double y = 2;
	double z = 3;
}

//https://blog.codingnow.com/2008/11/aoi_server.html
// View radius
message ViewRadius
{
	double radius = 1;
}

// Player base attributes comp, stores only combat-related base attributes
message BaseAttributesComp {
    uint64 strength = 1;    // Strength, affects physical attack
    uint64 stamina = 2;     // Stamina, affects HP etc.
    uint64 health = 3;      // Current HP
    uint64 mana = 4;        // Current mana
    uint64 critchance = 5;  // Crit chance
    uint64 armor = 6;       // Armor
    uint64 resistance = 7;  // Resistance
}

// Player level comp, manages level and level-related features
message LevelComp {
    uint32 level = 1;  // Player level
}

message ActorStateComp {
    map<uint32, bool> state_list = 1; 
}
