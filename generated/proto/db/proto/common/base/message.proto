syntax = "proto3";
option go_package = "db/proto/common/base";



import "proto/common/base/common.proto";
import "proto/common/base/session.proto";
import "proto/common/base/tip.proto";

// Routing node info
message RoutingNodeInfo
{
  NodeInfo node_info = 1;  // Node info
  uint32 message_id = 2;   // Message ID
}

// Message content
message MessageContent
{
  bytes serialized_message = 1;          // Serialized message body
  uint32 message_id = 2;   // Message ID
  uint64 id = 3;           // Unique message ID
  TipInfoMessage error_message = 4;  // Error message (optional)
}

// Node message header
message NodeMessageHeader
{
  uint32 node_id = 1;      // Node ID
  uint64 session_id = 2;   // Session ID
}

// Node route message request
message NodeRouteMessageRequest
{
  MessageContent message_content = 1;      // Message content
  NodeMessageHeader header = 2; // Node message header
}

// Node route message response
message NodeRouteMessageResponse
{
  MessageContent message_content = 1;      // Message content
  NodeMessageHeader header = 2; // Node message header
}

// Player info (external)
message PlayerInfoExternal
{
  uint64 player_id = 1;  // Player ID
}

// Player node service request
message PlayerNodeServiceRequest
{
  MessageContent message_content = 1;          // Message content
  PlayerInfoExternal header = 2;    // Player info
}

// Player message response
message PlayerMessageResponse
{
  MessageContent message_content = 1;          // Message content
  PlayerInfoExternal header = 2;    // Player info
}

// Node routing message body
message NodeRoutingMessageBody
{
  NodeInfo node_info = 2;  // Node info
}

// Register scene node session request
message RegisterGameNodeSessionRequest
{
  SessionDetails session_info = 1;  // Session details
  uint32 scene_node_id = 2;          // Scene node ID
}

// Register scene node session response
message RegisterGameNodeSessionResponse
{
  SessionDetails session_info = 1;  // Session details
}

// Register gate node session response
message RegisterGateNodeSessionResponse
{
  SessionDetails session_info = 1;  // Session details
}

// Gate session disconnect request
message GateSessionDisconnectRequest
{
  SessionDetails session_info = 1;  // Session details
}

// Route message request (bytes form)
message RouteMessageRequest
{
  bytes body = 1;                               // Message body (bytes)
  repeated RoutingNodeInfo route_nodes = 2;     // Routing node list
  uint64 session_id = 3;                        // Session ID
  uint64 id = 4;                                // Unique message ID
  bool is_client = 5;                           // Whether from client
}

// Route message response (bytes form)
message RouteMessageResponse
{
  bytes body = 1;                               // Message body (bytes)
  repeated RoutingNodeInfo route_nodes = 2;     // Routing node list
  uint64 session_id = 3;                        // Session ID
  uint64 id = 4;                                // Unique message ID
  bool is_client = 5;                           // Whether from client
}

// Route player message request (bytes form)
message RoutePlayerMessageRequest
{
  bytes body = 1;              // Message body (bytes)
  repeated NodeInfo node_list = 2; // Node list
  PlayerInfoExternal player_info = 3;  // Player info
}

// Route player message response (bytes form)
message RoutePlayerMessageResponse
{
  bytes body = 1;              // Message body (bytes)
  repeated NodeInfo node_list = 2; // Node list
  PlayerInfoExternal player_info = 3;  // Player info
}

// Register scene node request
message RegisterGameNodeRequest
{
  NetworkAddress rpc_client = 1;  // Client RPC address
  NetworkAddress rpc_server = 2;  // Server RPC address
  uint32 scene_node_id = 3;        // Scene node ID
  uint32 server_type = 4;         // Server type
  uint32 scene_node_type = 5;         // Scene node type
}

// Register gate node request
message RegisterGateNodeRequest
{
  NetworkAddress rpc_client = 1;  // Client RPC address
  uint32 gate_node_id = 2;        // Gate node ID
}

// Unregister scene node request
message UnregisterGameNodeRequest
{
  uint32 scene_node_id = 1;  // Scene node ID
}

message ProtoFieldCheckerTestSubPB
{
  repeated string items = 1;
}

message ProtoFieldCheckerTestPB
{
	ProtoFieldCheckerTestSubPB sub_message = 1;
}

// Main message type (test)
message MyProtoMessage 
{
  int32 single_int32_field = 1;          // Single int32 field
  int64 single_int64_field = 2;          // Single int64 field
  repeated int32 repeated_int32_field = 3; // Repeated int32 field
  repeated int64 repeated_int64_field = 4; // Repeated int64 field
  MyNestedMessage nested_message = 5;    // Nested message field
}

// Nested message type (test)
message MyNestedMessage 
{
  int32 nested_int32_field = 1;          // Single int32 field
  int64 nested_int64_field = 2;          // Single int64 field
}

message ClientRequest
{
  uint64 id = 1;
  string service = 2;
  string method = 3;
  bytes body = 4;
  uint32 message_id = 5;
}

message NodeHandshakeRequest {
    string version = 1;
    string token = 2;
	NodeInfo self_node = 3;
}

message NodeHandshakeResponse {
    TipInfoMessage error_message = 1;  // Error message (optional)
	NodeInfo peer_node = 2;              // Peer node info (returns the remote side)
}

// ── Client-to-Gate connection token (anti-cheat handshake) ─────────────

// Payload signed by Login, verified by Gate.
message GateTokenPayload {
  uint32 gate_node_id = 1;   // which gate this token is for
  uint32 zone_id = 2;        // zone context
  int64 expire_timestamp = 3; // unix seconds — token invalid after this time
}

// Client sends this as the FIRST protobuf message after TCP-connecting to Gate.
message ClientTokenVerifyRequest {
  bytes payload = 1;     // serialized GateTokenPayload
  bytes signature = 2;   // HMAC-SHA256(secret, payload) — 32 raw bytes
}

// Gate responds after verifying the token.
message ClientTokenVerifyResponse {
  bool success = 1;
  string error = 2;       // non-empty on failure
}
