syntax = "proto3";
option go_package = "db/proto/common/rollback";

// Transaction types — every bidirectional operation that moves items/currency
// between players (or between a player and a system sink) must be logged.
//
// Crash-replay extension (cross-server-rollback-gap-fixes.md §2.4 — B2):
//   The original op set above (1..19) covers transfers and clawbacks.
//   To support PostCrashReplay (replay "additive" operations a player
//   acquired between the last save and a scene-node crash), we also log
//   pure-gain operations 20..23. These are NOT clawback-eligible by
//   themselves — they're recovery records for crash forensics. The
//   replay tool reads them with `since_ms > last_save_ms` and re-applies
//   each via the same module entry point that originally produced them.
//
//   Anti-dup invariant: every replayable op MUST carry a unique tx_id
//   (SnowFlake). PostCrashReplay tracks "applied tx_ids" per player so
//   replaying the log twice produces the same end state — see
//   single_player_rollback.md §"Anti-Duplication" for the broader pattern.
enum TransactionType
{
  TX_UNKNOWN = 0;
  TX_TRADE = 1;             // Player-to-player trade
  TX_MAIL_ATTACHMENT = 2;   // Mail with items/currency
  TX_AUCTION_SELL = 3;      // Auction house listing sold
  TX_AUCTION_BUY = 4;       // Auction house purchase
  TX_GUILD_BANK_DEPOSIT = 5;
  TX_GUILD_BANK_WITHDRAW = 6;
  TX_QUEST_REWARD = 7;      // Quest/mission reward grant
  TX_SYSTEM_GRANT = 8;      // Server-side grant (event, compensation)
  TX_GM_GRANT = 9;          // GM tool grant
  TX_GM_DEDUCT = 10;        // GM tool deduction
  TX_SHOP_BUY = 11;         // NPC shop purchase (currency → item)
  TX_SHOP_SELL = 12;        // NPC shop sell (item → currency)
  TX_ITEM_DESTROY = 13;     // Item destroyed / consumed
  TX_CURRENCY_ADD = 14;     // Generic currency gain
  TX_CURRENCY_DEDUCT = 15;  // Generic currency spend
  TX_ROLLBACK_RESTORE = 16; // Item/currency restored via rollback
  TX_CLAWBACK = 17;         // Precision clawback (Bug exploit recovery)
  TX_DEFERRED_CLAWBACK = 18;// Deferred clawback (补缴) auto-deduction
  TX_BATCH_RECALL = 19;     // Batch recall (批量回收) by GM

  // ── Crash-replay-eligible "additive" ops (P1-B / B2) ─────────────────
  //
  // These types log an item / progression gain that the player earned
  // between their last persistence checkpoint and a (possible) scene-node
  // crash. PostCrashReplay re-applies them on the next safe load if the
  // player's last_save_ms is older than the op's timestamp.

  TX_ITEM_AWARD = 20;       // Loot drop / chest open / package open / boss reward.
                            // item_uuid + item_config_id + item_quantity + extra(json) carry
                            // the source ("monster_id":..., "drop_table":...) so replay can
                            // verify the award is still valid (e.g. the boss is still defeated).

  TX_QUEST_COMPLETE = 21;   // Player completed an objective / turned in a quest.
                            // extra(json) carries quest_id + step_id + reward_summary so
                            // replay re-grants rewards if the player's quest record
                            // doesn't yet reflect the completion. Idempotency:
                            // replaying a completed quest is a no-op via tx_id dedup.

  TX_LEVEL_UP = 22;         // Level boundary crossed. Cheap to log, cheap to replay
                            // (level-up handler is idempotent against current XP).
                            // extra(json) carries old_level + new_level + xp_total.

  TX_BUFF_GAIN = 23;        // Long-duration buff gained (>30 min remaining at log time)
                            // that the player would notice missing post-crash. Short
                            // buffs are NOT logged — too high-frequency, low value.
                            // extra(json) carries buff_id + duration_remaining_ms.
}

// A single transaction log entry.  Written to Kafka → Go DB → MySQL.
// This is the foundation for: rollback diff, precision clawback, audit.
message TransactionLogEntry
{
  uint64 tx_id = 1;              // Unique ID (SnowFlake)
  uint64 timestamp = 2;          // Unix seconds
  TransactionType tx_type = 3;

  // Participants
  uint64 from_player = 4;        // Source player (0 = system)
  uint64 to_player = 5;          // Destination player (0 = system/NPC)

  // Item details (omit if currency-only)
  uint64 item_uuid = 6;          // Item instance UUID (SnowFlake Guid)
  uint32 item_config_id = 7;     // Item template/config ID
  uint32 item_quantity = 8;      // Stack count

  // Currency details (omit if item-only)
  uint32 currency_type = 9;      // CurrencyType enum value
  int64 currency_delta = 10;     // Positive = gain, negative = spend

  // Balance snapshot at the moment of this transaction
  uint64 balance_before = 11;
  uint64 balance_after = 12;

  // Correlation: links related operations (e.g. both sides of a trade)
  uint64 correlation_id = 13;    // Shared SnowFlake ID across paired entries

  // Free-form metadata (JSON)
  string extra = 14;
}

// Batch wrapper for Kafka transport.
message TransactionLogBatch
{
  repeated TransactionLogEntry entries = 1;
}
