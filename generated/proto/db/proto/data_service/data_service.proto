syntax = "proto3";
package data_service;

import "google/protobuf/empty.proto";

option go_package = "db/proto/data_service";

// DataService: Cross-realm transparent data proxy.
// Scene Server calls this service with player_id only;
// DataService internally routes to the player's home-realm Redis.
service DataService {
  // ── Player lifecycle data ─────────────────────────────────────
  rpc LoadPlayerData(LoadPlayerDataRequest) returns (LoadPlayerDataResponse) {}
  rpc SavePlayerData(SavePlayerDataRequest) returns (SavePlayerDataResponse) {}

  // ── Fine-grained key/value access ────────────────────────────
  rpc GetPlayerField(GetPlayerFieldRequest) returns (GetPlayerFieldResponse) {}
  rpc SetPlayerField(SetPlayerFieldRequest) returns (SetPlayerFieldResponse) {}

  // ── Player-zone mapping (registration / merge) ───────────────
  rpc RegisterPlayerZone(RegisterPlayerZoneRequest) returns (google.protobuf.Empty) {}
  rpc GetPlayerHomeZone(GetPlayerHomeZoneRequest) returns (GetPlayerHomeZoneResponse) {}
  rpc BatchGetPlayerHomeZone(BatchGetPlayerHomeZoneRequest) returns (BatchGetPlayerHomeZoneResponse) {}

  // ── Cleanup / merge ──────────────────────────────────────────
  rpc DeletePlayerData(DeletePlayerDataRequest) returns (DeletePlayerDataResponse) {}

  // ── Snapshot / Rollback ──────────────────────────────────────
  rpc CreatePlayerSnapshot(CreatePlayerSnapshotRequest) returns (CreatePlayerSnapshotResponse) {}
  rpc ListPlayerSnapshots(ListPlayerSnapshotsRequest) returns (ListPlayerSnapshotsResponse) {}
  rpc GetPlayerSnapshotDiff(GetPlayerSnapshotDiffRequest) returns (GetPlayerSnapshotDiffResponse) {}
  rpc RollbackPlayer(RollbackPlayerRequest) returns (RollbackPlayerResponse) {}
  rpc RollbackZone(RollbackZoneRequest) returns (RollbackZoneResponse) {}
  rpc RollbackAll(RollbackAllRequest) returns (RollbackAllResponse) {}

  // ── Batch Recall / Anomaly / Event Snapshot ──────────────────
  rpc BatchRecallItems(BatchRecallItemsRequest) returns (BatchRecallItemsResponse) {}
  rpc QueryTransactionLog(QueryTransactionLogRequest) returns (QueryTransactionLogResponse) {}
  rpc CreateEventSnapshot(CreateEventSnapshotRequest) returns (CreateEventSnapshotResponse) {}
}

// ── Load / Save ────────────────────────────────────────────────

message LoadPlayerDataRequest {
  uint64 player_id = 1;
  repeated string fields = 2; // optional: specific fields to load; empty = all
}

message LoadPlayerDataResponse {
  uint32 error_code = 1;
  map<string, bytes> data = 2; // field_name → serialised value
  uint64 version = 3;          // optimistic-lock version
}

message SavePlayerDataRequest {
  uint64 player_id = 1;
  map<string, bytes> data = 2;
  uint64 expected_version = 3; // 0 = skip version check
}

message SavePlayerDataResponse {
  uint32 error_code = 1;
  uint64 new_version = 2;
}

// ── Field-level access ─────────────────────────────────────────

message GetPlayerFieldRequest {
  uint64 player_id = 1;
  string field = 2;
}

message GetPlayerFieldResponse {
  uint32 error_code = 1;
  bytes value = 2;
}

message SetPlayerFieldRequest {
  uint64 player_id = 1;
  string field = 2;
  bytes value = 3;
  uint64 expected_version = 4; // 0 = skip version check
}

message SetPlayerFieldResponse {
  uint32 error_code = 1;
  uint64 new_version = 2;
}

// ── Zone mapping ───────────────────────────────────────────────

message RegisterPlayerZoneRequest {
  uint64 player_id = 1;
  uint32 home_zone_id = 2;
}

message GetPlayerHomeZoneRequest {
  uint64 player_id = 1;
}

message GetPlayerHomeZoneResponse {
  uint32 home_zone_id = 1;
}

message BatchGetPlayerHomeZoneRequest {
  repeated uint64 player_ids = 1;
}

message BatchGetPlayerHomeZoneResponse {
  map<uint64, uint32> player_zone_map = 2; // player_id → home_zone_id
}

// ── Delete / Cleanup ───────────────────────────────────────────

message DeletePlayerDataRequest {
  uint64 player_id = 1;
  bool   delete_zone_mapping = 2; // also remove player→zone mapping?
}

message DeletePlayerDataResponse {
  uint32 error_code = 1;
  uint32 keys_deleted = 2;
}

// ── Snapshot / Rollback ────────────────────────────────────────

enum SnapshotType {
  SNAPSHOT_MANUAL          = 0; // GM-triggered
  SNAPSHOT_PERIODIC        = 1; // Scheduled (cron)
  SNAPSHOT_PRE_MAINTENANCE = 2; // Before server maintenance
  SNAPSHOT_PRE_ROLLBACK    = 3; // Auto-created before any rollback
  SNAPSHOT_LOGIN           = 4; // On player login
}

enum RollbackScope {
  ROLLBACK_FULL    = 0; // Restore all fields
  ROLLBACK_PARTIAL = 1; // Restore selected fields only
}

// ── Snapshot management ────────────────────────────────────────

message CreatePlayerSnapshotRequest {
  uint64 player_id = 1;
  SnapshotType type = 2;
  string reason = 3;
  string operator = 4; // GM operator name
}

message CreatePlayerSnapshotResponse {
  uint32 error_code = 1;
  uint64 snapshot_id = 2;
  uint64 created_at = 3; // unix timestamp
}

message ListPlayerSnapshotsRequest {
  uint64 player_id = 1;
  uint64 before_time = 2; // only snapshots before this time (0 = no filter)
  uint32 limit = 3;       // max results (0 = default 20)
}

message SnapshotInfo {
  uint64 snapshot_id = 1;
  uint64 player_id = 2;
  uint32 zone_id = 3;
  SnapshotType type = 4;
  uint64 created_at = 5;
  string reason = 6;
  string operator = 7;
  uint32 data_size_bytes = 8;
  repeated string fields = 9; // field names in this snapshot
}

message ListPlayerSnapshotsResponse {
  uint32 error_code = 1;
  repeated SnapshotInfo snapshots = 2;
}

// ── Snapshot diff (soft rollback support) ──────────────────────

message GetPlayerSnapshotDiffRequest {
  uint64 player_id = 1;
  uint64 snapshot_id = 2;    // specific snapshot; 0 = use target_time
  uint64 target_time = 3;    // find latest snapshot before this time
}

message FieldDiff {
  string field = 1;
  bytes  snapshot_value = 2;  // value in snapshot (empty if field didn't exist)
  bytes  current_value = 3;   // current live value (empty if field doesn't exist)
  bool   only_in_snapshot = 4;
  bool   only_in_current = 5;
}

message GetPlayerSnapshotDiffResponse {
  uint32 error_code = 1;
  uint64 snapshot_id_used = 2;
  uint64 snapshot_time = 3;
  repeated FieldDiff diffs = 4; // only fields that differ
}

// ── Single player rollback ─────────────────────────────────────

message RollbackPlayerRequest {
  uint64 player_id = 1;
  uint64 snapshot_id = 2;    // specific snapshot; 0 = use target_time
  uint64 target_time = 3;    // rollback to latest snapshot before this time
  RollbackScope scope = 4;
  repeated string fields = 5; // only for ROLLBACK_PARTIAL
  string reason = 6;
  string operator = 7;
}

message RollbackPlayerResponse {
  uint32 error_code = 1;
  uint64 snapshot_id_used = 2;
  uint64 pre_rollback_snapshot_id = 3; // safety snapshot created before rollback
  repeated string fields_restored = 4;
}

// ── Zone rollback ──────────────────────────────────────────────

message RollbackZoneRequest {
  uint32 zone_id = 1;
  uint64 target_time = 2;
  string reason = 3;
  string operator = 4;
}

message RollbackZoneResponse {
  uint32 error_code = 1;
  uint32 players_affected = 2;
  uint32 players_failed = 3;
  repeated uint64 failed_player_ids = 4;
  repeated uint64 orphan_player_ids = 5; // characters created after target_time, cleaned up
  uint32 orphans_cleaned = 6;
}

// ── Full server rollback ───────────────────────────────────────

message RollbackAllRequest {
  uint64 target_time = 1;
  string reason = 2;
  string operator = 3;
}

message RollbackAllResponse {
  uint32 error_code = 1;
  uint32 zones_processed = 2;
  uint32 players_affected = 3;
  uint32 players_failed = 4;
}

// ── Batch Recall ───────────────────────────────────────────────

message BatchRecallItemsRequest {
  repeated uint64 player_ids = 1;      // target players (empty = use query filter)
  uint32 item_config_id = 2;           // 0 = currency recall, >0 = item recall
  uint32 currency_type = 3;            // only when item_config_id == 0
  uint64 time_start = 4;               // transaction time range start (unix sec)
  uint64 time_end = 5;                 // transaction time range end (unix sec)
  repeated uint32 tx_types = 6;        // filter by TransactionType (e.g. TX_SYSTEM_GRANT)
  string reason = 7;
  string operator = 8;
  bool dry_run = 9;                    // true = report only, don't modify
}

message RecallResult {
  uint64 player_id = 1;
  uint64 item_uuid = 2;                // 0 for currency recalls
  uint32 item_config_id = 3;
  uint64 amount = 4;                   // quantity or currency amount recalled
  bool   success = 5;
  string error_detail = 6;
}

message BatchRecallItemsResponse {
  uint32 error_code = 1;
  uint32 total_matched = 2;            // transactions matching the filter
  uint32 total_recalled = 3;           // actually recalled (0 if dry_run)
  uint32 total_failed = 4;
  repeated RecallResult results = 5;
}

// ── Transaction Log Query ──────────────────────────────────────

message QueryTransactionLogRequest {
  uint64 player_id = 1;                // 0 = query all players
  uint64 time_start = 2;
  uint64 time_end = 3;
  repeated uint32 tx_types = 4;        // empty = all types
  uint32 item_config_id = 5;           // 0 = no item filter
  uint32 currency_type = 6;            // 0 = no currency filter
  uint32 limit = 7;                    // max results (default 100)
  uint64 offset = 8;                   // pagination offset
}

message TransactionLogRow {
  uint64 tx_id = 1;
  uint64 timestamp = 2;
  uint32 tx_type = 3;
  uint64 from_player = 4;
  uint64 to_player = 5;
  uint64 item_uuid = 6;
  uint32 item_config_id = 7;
  uint32 item_quantity = 8;
  uint32 currency_type = 9;
  int64  currency_delta = 10;
  uint64 balance_before = 11;
  uint64 balance_after = 12;
  uint64 correlation_id = 13;
  string extra = 14;
}

message QueryTransactionLogResponse {
  uint32 error_code = 1;
  repeated TransactionLogRow rows = 2;
  uint32 total_count = 3;              // total matching rows (for pagination)
}

// ── Event-Triggered Snapshot ───────────────────────────────────

enum SnapshotEventType {
  EVENT_LARGE_TRANSACTION  = 0;  // Currency/item above threshold
  EVENT_RECHARGE           = 1;  // Real-money purchase
  EVENT_PRE_MAINTENANCE    = 2;  // Scheduled maintenance
  EVENT_LEVEL_UP           = 3;  // Milestone level-up
  EVENT_FIRST_LOGIN        = 4;  // First login of the day
}

message CreateEventSnapshotRequest {
  uint64 player_id = 1;
  SnapshotEventType event_type = 2;
  string event_detail = 3;             // human-readable context
  string operator = 4;
}

message CreateEventSnapshotResponse {
  uint32 error_code = 1;
  uint64 snapshot_id = 2;
  uint64 created_at = 3;
}
