syntax = "proto3";
option go_package = "db/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/component/currency_comp.proto";
import "proto/common/rollback/transaction_log.proto";
import "proto/common/rollback/player_snapshot.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;

// ============================================================================
// Deferred Clawback (补缴) — GM debt management
// ============================================================================

message GmAttachDebtRequest
{
  uint32 currency_type = 1;
  uint64 owe_amount = 2;
  string reason = 3;
  string gm_operator = 4;
  uint64 expires_at = 5;          // 0 = never expires
}
message GmAttachDebtResponse
{
  TipInfoMessage error_message = 1;
  CurrencyDebtEntry debt = 2;    // Current state after attach
}

message GmWaiveDebtRequest
{
  uint32 currency_type = 1;
  string gm_operator = 2;
  string reason = 3;
}
message GmWaiveDebtResponse
{
  TipInfoMessage error_message = 1;
  uint64 waived_remaining = 2;   // Amount that was written off
}

message GmAdjustDebtRequest
{
  uint32 currency_type = 1;
  int64 adjustment = 2;          // Positive = increase debt; negative = decrease
  string gm_operator = 3;
  string reason = 4;
}
message GmAdjustDebtResponse
{
  TipInfoMessage error_message = 1;
  CurrencyDebtEntry debt = 2;
}

message GmFreezeDebtRequest
{
  uint32 currency_type = 1;
  bool freeze = 2;               // true = freeze, false = unfreeze
  string gm_operator = 3;
}
message GmFreezeDebtResponse
{
  TipInfoMessage error_message = 1;
  CurrencyDebtEntry debt = 2;
}

message GmQueryDebtRequest
{
}
message GmQueryDebtResponse
{
  TipInfoMessage error_message = 1;
  repeated CurrencyDebtEntry debts = 2;
}

// ============================================================================
// Snapshot — on-demand player data snapshot
// ============================================================================

message GmCreateSnapshotRequest
{
  string reason = 1;
}
message GmCreateSnapshotResponse
{
  TipInfoMessage error_message = 1;
  uint64 snapshot_id = 2;
  uint64 snapshot_time = 3;
}

message GmListSnapshotsRequest
{
  uint64 time_start = 1;
  uint64 time_end = 2;
  uint32 limit = 3;
}
message GmListSnapshotsResponse
{
  TipInfoMessage error_message = 1;
  repeated PlayerSnapshotEntry snapshots = 2;
}

// ============================================================================
// Rollback — full rollback procedure
// ============================================================================

// Step 1: Preview — compute diff between snapshot and current state,
//         marking which items/currencies are restorable.
message GmPreviewRollbackRequest
{
  uint64 snapshot_id = 1;
}
message GmPreviewRollbackResponse
{
  TipInfoMessage error_message = 1;
  SnapshotDiff diff = 2;
}

// Step 2: Execute — apply the approved rollback.
//         The player MUST be offline before this call.
message GmExecuteRollbackRequest
{
  uint64 snapshot_id = 1;
  string gm_operator = 2;
  string reason = 3;
  // If empty, restores all restorable items/currencies.
  // If specified, only restores the listed item UUIDs / currency types.
  repeated uint64 restore_item_uuids = 4;
  repeated uint32 restore_currency_types = 5;
}
message GmExecuteRollbackResponse
{
  TipInfoMessage error_message = 1;
  uint32 items_restored = 2;
  uint32 items_skipped = 3;
  uint32 currencies_restored = 4;
  uint32 currencies_skipped = 5;
}

// ============================================================================
// Transaction Log — query for GM investigation
// ============================================================================

message GmQueryTransactionLogRequest
{
  uint64 time_start = 1;
  uint64 time_end = 2;
  uint64 item_uuid = 3;          // 0 = don't filter by item
  uint32 tx_type = 4;            // 0 = all types
  uint32 limit = 5;
}
message GmQueryTransactionLogResponse
{
  TipInfoMessage error_message = 1;
  repeated TransactionLogEntry entries = 2;
}

// ============================================================================
// Precision Clawback — trace and remove dirty items from Bug exploit
// ============================================================================

// Trace: follow a dirty item UUID across all players who touched it.
message GmTraceItemRequest
{
  uint64 item_uuid = 1;
}

message TraceHop
{
  uint64 tx_id = 1;
  uint64 from_player = 2;
  uint64 to_player = 3;
  uint64 timestamp = 4;
  TransactionType tx_type = 5;
}

message GmTraceItemResponse
{
  TipInfoMessage error_message = 1;
  uint64 item_uuid = 2;
  uint32 item_config_id = 3;
  uint64 current_owner = 4;      // 0 = destroyed/consumed
  repeated TraceHop chain = 5;   // Ordered by timestamp
}

// Clawback: remove a specific item from its current owner.
message GmClawbackItemRequest
{
  uint64 item_uuid = 1;
  string gm_operator = 2;
  string reason = 3;
  bool refund_buyer = 4;         // If item was legitimately bought, refund the buyer
}
message GmClawbackItemResponse
{
  TipInfoMessage error_message = 1;
  uint64 removed_from_player = 2;
  uint64 refunded_amount = 3;    // 0 if no refund
}

// ============================================================================
// Service definition — all GM rollback/audit operations for a player
// ============================================================================

service SceneRollbackClientPlayer
{
  option (OptionIsPlayerService) = true;

  // Deferred clawback (补缴)
  rpc GmAttachDebt (GmAttachDebtRequest) returns (GmAttachDebtResponse);
  rpc GmWaiveDebt (GmWaiveDebtRequest) returns (GmWaiveDebtResponse);
  rpc GmAdjustDebt (GmAdjustDebtRequest) returns (GmAdjustDebtResponse);
  rpc GmFreezeDebt (GmFreezeDebtRequest) returns (GmFreezeDebtResponse);
  rpc GmQueryDebt (GmQueryDebtRequest) returns (GmQueryDebtResponse);

  // Snapshot
  rpc GmCreateSnapshot (GmCreateSnapshotRequest) returns (GmCreateSnapshotResponse);
  rpc GmListSnapshots (GmListSnapshotsRequest) returns (GmListSnapshotsResponse);

  // Rollback
  rpc GmPreviewRollback (GmPreviewRollbackRequest) returns (GmPreviewRollbackResponse);
  rpc GmExecuteRollback (GmExecuteRollbackRequest) returns (GmExecuteRollbackResponse);

  // Transaction log
  rpc GmQueryTransactionLog (GmQueryTransactionLogRequest) returns (GmQueryTransactionLogResponse);

  // Precision clawback
  rpc GmTraceItem (GmTraceItemRequest) returns (GmTraceItemResponse);
  rpc GmClawbackItem (GmClawbackItemRequest) returns (GmClawbackItemResponse);
}
