syntax = "proto3";

option go_package = "friend/proto/login";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/base/user_accounts.proto";
import "proto/common/base/common.proto";

package loginpb;

message LoginSessionInfo {
  string account = 1;
  uint64 role_id = 2;
  uint64 session_id = 3;
  uint64 gate_id = 4;
  string device_id = 5;
  int64 login_time = 6;
  string fsm = 7;
}

message AccountSimplePlayerWrapper
{
  AccountSimplePlayer player = 1;
}

message LoginRequest
{
  string account = 1;
  string password = 2;
}

message LoginResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
}

message TestResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
  repeated string teststring = 3;
  repeated int32 testint = 4;
}

message CreatePlayerRequest
{
}

message CreatePlayerResponse
{
  TipInfoMessage error_message = 1;
  repeated AccountSimplePlayerWrapper players = 2;
}

message EnterGameRequest
{
  uint64 player_id  = 1;

  // Client-generated idempotent request ID (must reuse for retries of the same request)
  string request_id = 2;
}

message EnterGameResponse
{
  TipInfoMessage error_message = 1;
  uint64 player_id  = 2;
}

message LeaveGameRequest
{
}

message LoginNodeDisconnectRequest
{
  uint64 session_id = 1;
}

message LoginEmptyResponse
{
}

service ClientPlayerLogin  {
  option (OptionIsClientProtocolService) = true;

  rpc Login (LoginRequest) returns (LoginResponse);
  rpc CreatePlayer (CreatePlayerRequest) returns (CreatePlayerResponse);
  rpc EnterGame (EnterGameRequest) returns (EnterGameResponse);
  rpc LeaveGame (LeaveGameRequest) returns (LoginEmptyResponse);
  rpc Disconnect (LoginNodeDisconnectRequest) returns (LoginEmptyResponse);
}

// ── Pre-connection RPCs (called before connecting to Gate) ──────

message GateEndpoint {
  uint32 node_id = 1;
  string ip = 2;
  uint32 port = 3;
  uint32 player_count = 4; // current connection count for load balancing
}

message GetGateListRequest {
}

message GetGateListResponse {
  repeated GateEndpoint gates = 1;
}

service LoginPreGate {
  // Client calls this before connecting to any Gate.
  // Returns all available Gate endpoints with current load.
  // Client picks the least-loaded Gate and TCP-connects to it.
  rpc GetGateList (GetGateListRequest) returns (GetGateListResponse);
}

// ── Admin-only RPCs (internal, not client-facing) ──────────────

message RemovePlayersFromAccountsRequest {
  repeated uint64 player_ids = 1; // orphan player IDs to remove from their accounts
}

message RemovePlayersFromAccountsResponse {
  uint32 removed_count = 1;    // players successfully removed from accounts
  uint32 not_found_count = 2;  // players whose reverse mapping was missing
  uint32 failed_count = 3;     // players that failed to remove
}

service LoginAdmin {
  // Remove orphan characters from their accounts' SimplePlayers lists.
  // Called by admin tools after zone rollback to clean up orphan characters.
  // Uses player_to_account:{player_id} reverse mapping to find the owning account.
  rpc RemovePlayersFromAccounts (RemovePlayersFromAccountsRequest) returns (RemovePlayersFromAccountsResponse);
}
