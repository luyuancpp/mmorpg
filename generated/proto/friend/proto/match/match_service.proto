syntax = "proto3";
package match;

import "proto/common/base/empty.proto";
import "proto/common/base/tip.proto";

option go_package = "friend/proto/match";

// MatchService: Server-driven matchmaking for MOBA instances.
// Players request to join a queue; the server pairs them and creates an instance
// via SceneManager.CreateScene when enough players are found.
service MatchService {
  // Player requests to join a match queue.
  rpc JoinQueue(JoinQueueRequest) returns (JoinQueueResponse) {}

  // Player cancels their queued match request.
  rpc CancelQueue(CancelQueueRequest) returns (Empty) {}

  // Query current queue status for a player.
  rpc GetQueueStatus(GetQueueStatusRequest) returns (GetQueueStatusResponse) {}
}

// ----- Match mode config -----

// Match mode determines team size, player count, and map config.
enum MatchMode {
  MATCH_MODE_UNSPECIFIED = 0;
  MATCH_MODE_5V5         = 1; // 10 players total
  MATCH_MODE_3V3         = 2; // 6 players total
  MATCH_MODE_1V1         = 3; // 2 players total
}

// ----- Join queue -----

message JoinQueueRequest {
  uint64 player_id = 1;               // Initiating player
  MatchMode mode = 2;                 // Desired match mode (5v5, 3v3, 1v1)
  uint32 map_config_id = 3;           // Map template config ID (maps to scene_config_id)
  repeated uint64 party_member_ids = 4; // Pre-made party (includes player_id)
  uint32 zone_id = 5;                 // Player's current zone
}

message JoinQueueResponse {
  uint32 error_code = 1;              // 0 = success
  string queue_ticket = 2;            // Ticket ID for tracking / cancellation
  TipInfoMessage error_message = 3;
}

// ----- Cancel queue -----

message CancelQueueRequest {
  uint64 player_id = 1;
  string queue_ticket = 2;            // Ticket to cancel
}

// ----- Queue status -----

message GetQueueStatusRequest {
  uint64 player_id = 1;
}

message GetQueueStatusResponse {
  QueueState state = 1;
  uint32 estimated_wait_seconds = 2;  // Server-estimated wait time
  uint32 queued_seconds = 3;          // How long the player has been waiting
}

enum QueueState {
  QUEUE_STATE_UNSPECIFIED = 0;
  QUEUE_STATE_QUEUED      = 1;  // Waiting for match
  QUEUE_STATE_MATCHED     = 2;  // Match found, instance being created
  QUEUE_STATE_READY       = 3;  // Instance created, waiting for player confirm
  QUEUE_STATE_ENTERING    = 4;  // Players entering scene
  QUEUE_STATE_NOT_QUEUED  = 5;  // Player is not in any queue
}

// ----- Server-internal: match result (used between MatchService and SceneManager) -----

// MatchResult is produced internally when matchmaking completes.
// MatchService uses this to call SceneManager.CreateScene.
message MatchResult {
  string match_id = 1;                // Unique match identifier
  MatchMode mode = 2;
  uint32 map_config_id = 3;           // scene_config_id for CreateScene
  uint32 dungeon_config_id = 4;       // dungeon_config_id for CreateScene
  repeated MatchTeam teams = 5;
  uint32 zone_id = 6;
}

message MatchTeam {
  uint32 team_index = 1;              // 0 = team A, 1 = team B
  repeated uint64 player_ids = 2;
}
