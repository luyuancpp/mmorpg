syntax = "proto3";
option go_package = "friend/proto/scene";

import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/component/currency_comp.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;

message GmAddCurrencyRequest
{
  uint32 currency_type = 1;
  int64 amount = 2;
}

message GmAddCurrencyResponse
{
  TipInfoMessage error_message = 1;
  uint64 balance_after = 2;
}

message GmDeductCurrencyRequest
{
  uint32 currency_type = 1;
  int64 amount = 2;
}

message GmDeductCurrencyResponse
{
  TipInfoMessage error_message = 1;
  uint64 balance_after = 2;
}

message GetCurrencyListRequest
{
}

message GetCurrencyListResponse
{
  TipInfoMessage error_message = 1;
  CurrencyComp currency = 2;
}

message GmBlockCurrencyRequest
{
  uint32 currency_type = 1;
}

message GmBlockCurrencyResponse
{
  TipInfoMessage error_message = 1;
}

message GmUnblockCurrencyRequest
{
  uint32 currency_type = 1;
}

message GmUnblockCurrencyResponse
{
  TipInfoMessage error_message = 1;
}

service SceneCurrencyClientPlayer
{
  option (OptionIsPlayerService) = true;
  rpc GmAddCurrency (GmAddCurrencyRequest) returns (GmAddCurrencyResponse);
  rpc GmDeductCurrency (GmDeductCurrencyRequest) returns (GmDeductCurrencyResponse);
  rpc GetCurrencyList (GetCurrencyListRequest) returns (GetCurrencyListResponse);
  rpc GmBlockCurrency (GmBlockCurrencyRequest) returns (GmBlockCurrencyResponse);
  rpc GmUnblockCurrency (GmUnblockCurrencyRequest) returns (GmUnblockCurrencyResponse);
}
