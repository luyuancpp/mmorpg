syntax = "proto3";
option go_package = "friend/proto/common/component";



message MissionComp
{
	enum eMissionStatus
	{
	    E_MISSION_NORMAL = 0;
	    E_MISSION_ACHIEVEMENT = 1;
	    E_MISSION_COMPLETE = 2;
	    E_MISSION_TIME_OUT = 3;
	    E_MISSION_FAILD = 4;
	};
	uint32 id = 1;
	uint32 status = 2;
	repeated uint32 progress = 3;
	bytes data = 4; // Various buff data
}

message MissionListComp
{
	enum eMissionScope
	{
		kPlayerMission = 0;// Normal missions
		kPlayerAchievment = 1;// Achievements
		kPlayerDailyActivity = 2;// Daily activities
		kPlayerMissionSize = 3;// Max enum value
	}
	map<uint32, MissionComp> missions = 1;
	bytes complete_missions = 2;
	map<uint32, uint64> mission_begin_time = 3;
	uint32 type = 4;
}

message RewardListComp
{
	map<uint32, bool> can_reward_mission_id = 1;
}
