syntax = "proto3";
option go_package = "friend/proto/common/base";



message EndpointComp
{
  string ip = 1;
  uint32 port = 2;
}

message NodeInfo {
  uint32 node_id = 1;
  uint32 node_type = 2;
  uint64 launch_time = 3;
  uint32 scene_node_type = 4;
  EndpointComp endpoint = 5;
  uint32 zone_id = 6;
  uint32 protocol_type = 7; // Node communication protocol type
  string node_uuid = 8;
  uint32 player_count = 9; // Current online player/connection count (for load balancing)
}

message NodeInfoListComp
{
  repeated NodeInfo node_list = 1;
}

message NetworkAddress
{
  string ip = 1;
  uint32 port = 2;
}

message SceneInfoComp
{
  uint32 scene_confid = 1;// Scene config ID
  uint32 guid = 2;// Scene unique ID
  uint32 mirror_confid = 3;// Mirror ID
  uint32 dungen_confid = 4;// Dungeon ID
  map<uint64, bool> creators = 5;// Creators
}

