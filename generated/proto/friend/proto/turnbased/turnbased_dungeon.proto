syntax = "proto3";
option go_package = "friend/proto/turnbased";

import "proto/db/proto_option.proto";
import "proto/common/base/empty.proto";
import "proto/common/base/common.proto";
import "proto/common/base/message.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_TURNBASED_DUNGEON;

// ============================================================================
// Dungeon & Floor Messages
// ============================================================================

enum TileType {
  TILE_EMPTY     = 0;
  TILE_BATTLE    = 1;
  TILE_TREASURE  = 2;
  TILE_TRAP      = 3;
  TILE_HEAL      = 4;
  TILE_SHOP      = 5;
  TILE_BOSS      = 6;
  TILE_EXIT      = 7;
}

message DungeonTile {
  uint32 x        = 1;
  uint32 y        = 2;
  TileType type   = 3;
  bool   visited  = 4;
  bool   cleared  = 5;
  uint32 encounter_group_id = 6;  // for BATTLE/BOSS tiles
  repeated uint32 loot_ids  = 7;  // for TREASURE tiles
}

message FloorLayout {
  uint32 floor_number          = 1;
  uint32 width                 = 2;
  uint32 height                = 3;
  repeated DungeonTile tiles   = 4;
  uint32 start_x               = 5;
  uint32 start_y               = 6;
  uint32 exit_x                = 7;
  uint32 exit_y                = 8;
}

enum DungeonDifficulty {
  DIFFICULTY_NORMAL   = 0;
  DIFFICULTY_HARD     = 1;
  DIFFICULTY_HELL     = 2;
}

// ============================================================================
// Player Dungeon State
// ============================================================================

message DungeonProgress {
  uint64 player_id            = 1;
  uint32 dungeon_id           = 2;
  uint32 current_floor        = 3;
  uint32 current_x            = 4;
  uint32 current_y            = 5;
  DungeonDifficulty difficulty = 6;
  repeated uint32 cleared_floors = 7;
  FloorLayout current_layout  = 8;
}

// ============================================================================
// Service RPCs
// ============================================================================

message EnterDungeonRequest {
  uint64 player_id  = 1;
  uint32 dungeon_id = 2;
  DungeonDifficulty difficulty = 3;
}

message EnterDungeonResponse {
  uint32 error_code     = 1;
  FloorLayout layout    = 2;
}

message MoveInDungeonRequest {
  uint64 player_id = 1;
  uint32 target_x  = 2;
  uint32 target_y  = 3;
}

message MoveInDungeonResponse {
  uint32 error_code      = 1;
  DungeonTile tile       = 2;  // the tile player moved onto
  uint32 encounter_group_id = 3;  // non-zero if battle triggered
}

message NextFloorRequest {
  uint64 player_id = 1;
}

message NextFloorResponse {
  uint32 error_code  = 1;
  FloorLayout layout = 2;  // next floor layout
}

message QueryDungeonRequest {
  uint64 player_id = 1;
}

message QueryDungeonResponse {
  DungeonProgress progress = 1;
}

message LeaveDungeonRequest {
  uint64 player_id = 1;
}

message LeaveDungeonResponse {
  uint32 error_code = 1;
  repeated uint32 collected_items = 2;
  uint32 total_exp                = 3;
}

service TurnBasedDungeon {
  rpc EnterDungeon (EnterDungeonRequest) returns (EnterDungeonResponse);
  rpc MoveInDungeon (MoveInDungeonRequest) returns (MoveInDungeonResponse);
  rpc NextFloor (NextFloorRequest) returns (NextFloorResponse);
  rpc QueryDungeon (QueryDungeonRequest) returns (QueryDungeonResponse);
  rpc LeaveDungeon (LeaveDungeonRequest) returns (LeaveDungeonResponse);
  rpc NodeHandshake(NodeHandshakeRequest) returns (NodeHandshakeResponse);
}
