syntax = "proto3";
option go_package = "login/proto/common/event";

import "proto/common/component/scene_comp.proto";

message PlayerMigrationEvent {
  uint64 player_id = 1;
  uint64 source_scene_id = 2;
  uint64 target_scene_id = 3;
  bytes serialized_player_data = 4;
  uint32 from_zone = 5;
  uint32 to_zone = 6;
  int64 timestamp = 7;  // Event generation time
  ChangeSceneInfoComp scene_info = 9;
}
