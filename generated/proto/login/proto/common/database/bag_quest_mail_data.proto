syntax = "proto3";
option go_package = "login/proto/common/database";

import "proto/common/component/item_base_comp.proto";

// BagAllData — full snapshot of a player's bag/inventory state for
// cross-zone migration, persistence, and rollback.
//
// Background (cross-zone-readiness-audit.md §3.2 件 1):
//   PlayerAllData previously carried only 7 ECS components — Transform,
//   Currency, Skill, Level, etc. — none of which represented bag.
//   Bag lived in C++ scene-node ECS memory only (entt::registry on
//   the Bag class), so:
//     • cross-zone migration silently dropped bag every transition
//     • normal logout dropped bag (HandleExitGameNode → SavePlayerToRedis
//       marshalled the same 7 components, no bag)
//     • rollback could not restore bag (snapshot had no bag bytes)
//
//   This schema is the wire/storage format that closes those holes.
//
// Status (2026-05-16):
//   The proto + Marshal/Unmarshal land in code; the field set is the
//   conservative-default the project's design docs imply (item_uuid +
//   config_id + stack_size + position + bag_type). Game-design fields
//   like enchant level, sockets, gem inlay, bound state are explicitly
//   left as TODO placeholders below — adding them is a schema-extension
//   task that doesn't break the wire format (proto field numbers are
//   forward-compatible).
//
//   So the schema can ship as-is for cross-zone correctness on the
//   conservative subset, and gain richer item state incrementally as
//   the game-design surface lands. See §11.4 of the audit for the
//   "what shape do items actually take?" decision queue.

// One inventory slot in a player's bag tree. Mirrors the runtime
// `Bag::items_` map plus its `pos_` index.
message ItemEntry {
  // Globally unique item instance ID (SnowFlake), generated by
  // tlsSnowflakeManager.GenerateItemGuid(). Stable across stack
  // splits/merges — splitting an item creates a new uuid for the
  // split-off pile, the original uuid stays with the remainder.
  // Required for transaction_log correlation and exploit clawback
  // (single_player_rollback.md §"Anti-Duplication").
  uint64 item_uuid = 1;

  // Static template ID — config_id from ItemTable. Together with
  // stack_size this is enough to render the item; static stats live
  // in config and are not persisted per-instance.
  uint32 config_id = 2;

  // Number of items in this stack (stackable items collapse into one
  // entry). For non-stackable items (equipment) this is always 1.
  uint32 stack_size = 3;

  // Slot index within bag_type. Equipment slots have well-known
  // semantics (head/chest/...) defined by BagType + a slot
  // sub-enum that lives in cpp/libs/modules/bag/. Inventory bags
  // use position 0..capacity-1 freely.
  uint32 pos = 4;

  // Which bag this entry belongs to. Mirrors BagType in
  // cpp/libs/modules/bag/bag_system.h:
  //   0 = kInventory (main inventory)
  //   1 = kWarehouse
  //   2 = kEquipment
  //   3 = kTemporary
  // Stored as uint32 not the C++ enum so wire format is stable
  // across enum extensions.
  uint32 bag_type = 5;

  // ─── TODO: game-design extensions (add when策划 confirms) ──────────
  //
  // These fields are NOT in the conservative initial schema. They're
  // documented here so future schema additions land at well-known
  // field numbers and don't break wire compatibility.
  //
  // 6:  uint32 enchant_level    — refinement / +X grade. Common in MMOs.
  // 7:  repeated uint32 affixes — random word lines. Variable count.
  // 8:  repeated uint64 gem_uuids — sockets. Each gem is itself an item
  //                                  that may need its own ItemEntry.
  // 9:  uint32 bound_state      — 0 unbound / 1 soul-bound / 2 account-bound
  // 10: uint32 trade_count_left — for tradeable-N-times items
  // 11: uint64 expire_at_ms     — for time-limited items
  // 12: bytes  custom_blob      — escape hatch for system-specific state
  //                                (recipe progress, summon stats, etc.)
  //
  // When adding any of the above:
  //   1. uncomment the field with the exact number listed
  //   2. update Bag::Marshal/Unmarshal in player_database_loader.cpp
  //      (or wherever the bag persistence path lands)
  //   3. update ItemComp / supporting structs in cpp/libs/modules/bag/
  //   4. add transaction_log handling if the new field affects
  //      exploit-clawback (e.g. enchant_level transferred via trade)
}

// All bags / warehouses / equipment slots / temp bags for one player.
// One BagAllData replaces the per-Bag view in
// cpp/libs/modules/bag/bag_system.h's Bag class — all four bag_type
// instances are flattened here, distinguished by ItemEntry.bag_type.
message BagAllData {
  // One transient, runtime-keyed bag (event bag / per-pet bag). These
  // have NO fixed BagType slot — they come and go at runtime, keyed by
  // a uint64 owner id — so they're carried out-of-band from the fixed
  // `items`/`capacities` arrays above. Mirrors
  // PlayerBagsComp::dynamicBags_ (cpp/libs/modules/bag/comp/).
  message DynamicBagData {
    // Owner id of this transient bag: event id, pet guid, etc. Matches
    // the key in PlayerBagsComp::dynamicBags_.
    uint64 bag_id = 1;

    // Unlocked slot count for this bag (Bag::Capacity()).
    uint32 capacity = 2;

    // Items in this bag. ItemEntry.bag_type is IGNORED here (the bag is
    // identified by bag_id, not BagType) and should be left 0.
    repeated ItemEntry items = 3;
  }

  // All item entries across all bag_type buckets. Marshaller groups
  // by bag_type for ECS reconstruction; consumers can bucket on read.
  repeated ItemEntry items = 1;

  // Per-bag capacity for the four bag types. Index aligns with
  // BagType (kInventory=0, kWarehouse=1, kEquipment=2, kTemporary=3).
  // Default values come from kBagMaxCapacity / kWarehouseMaxCapacity
  // / kEquipmentCapacity / kTempBagMaxCapacity in bag_system.h —
  // those are compile-time constants today, but a player may have
  // unlocked extra slots via gameplay (Bag::Unlock); persisting per-
  // player capacity preserves that progression.
  repeated uint32 capacities = 2;

  // Transient runtime bags (event bags / per-pet bags). Empty for most
  // players. Each carries its own owner id + capacity + items.
  repeated DynamicBagData dynamic_bags = 3;

  // ─── TODO: game-design extensions ──────────────────────────────
  // 4: bag-wide currency (e.g. material points): not common, but cheap
  //    to add later if needed.
  // 5: collection-album state: if the project has a collection book
  //    that pings on first-time-acquired, its acquired-set could live here.
}

// QuestAllData — placeholder. Quest system does NOT exist in the cpp
// codebase yet (cross-zone-readiness-audit.md §1.2 confirmed via
// `grep -rn "QuestSystem"` returning zero hits in services/scene/).
// The proto exists so PlayerAllData has a slot ready when quest
// lands, and the cross-zone marshaller can be wired through without
// schema churn. See task #22 (quest persistence audit).
message QuestEntry {
  // Quest config_id from QuestTable.
  uint32 config_id = 1;
  // Progress toward completion. Schema TBD by quest team —
  // could be repeated counters, or a JSON blob, depending on
  // how complex objectives get (kill-N-mobs / collect-X /
  // reach-coords / chain-quest-N-of-M).
  uint32 progress = 2;
  // Quest state. 0=accepted / 1=in_progress / 2=ready_to_turn_in /
  // 3=completed. Stored as uint32 not enum for the same wire-stability
  // reason as ItemEntry.bag_type.
  uint32 state = 3;
  uint64 accepted_at_ms = 4;
  // ─── TODO: quest-specific game-design fields ──────────────────
  // (locked until quest module lands)
}

message QuestAllData {
  repeated QuestEntry active = 1;
  // Completed-quest IDs. Used for prereq checks ("you must have
  // completed quest X to accept Y") and achievement counting.
  repeated uint32 completed = 2;
  // Daily/weekly reset trackers — completed-set above is permanent;
  // these are the periodic ones that respawn.
  // TODO: schema decision pending — may need separate per-period
  // counters once daily/weekly reset code lands.
}

// MailAllData — placeholder + design note.
//
// IMPORTANT: per cross-zone-readiness-audit.md §3.3, mail is a
// special case. Unlike bag/quest which belong tightly to a player's
// session state, mail has an offline-delivery requirement: GM /
// system / other players send mail to recipients who may not be
// online on any scene node. So mail probably should NOT live inside
// PlayerAllData and travel with cross-zone migration — it belongs
// in an independent Go service (like guild/friend), keyed by
// player_id, queried over RPC when the player loads.
//
// This proto is reserved as a fallback for projects that prefer the
// "mail rides with PlayerAllData" model. Default plan is:
//   1. Build a mail Go service with its own MySQL table.
//   2. Don't fill MailAllData; leave it empty in PlayerAllData.
//   3. Scene node queries mail-service on player load, not via
//      Marshal'd bytes.
//
// Field shape sketched in case the decision flips:
message MailEntry {
  uint64 mail_id = 1;          // SnowFlake; unique across server
  uint64 sender_id = 2;        // 0 = system mail
  string subject = 3;
  string body = 4;
  uint64 sent_at_ms = 5;
  // Attached items — same ItemEntry shape as BagAllData. Once
  // claimed they migrate to BagAllData; until then they live with
  // the mail entry.
  repeated ItemEntry attached_items = 6;
  // Currency attachments. Repeated (currency_type, amount) pairs.
  // TODO: simple `map<uint32, uint64> attached_currency = 7` once
  // confirmed proto3 maps work in the toolchain (verify with
  // existing CurrencyComp which is `repeated uint64 values`).
  repeated uint32 attached_currency_types = 7;
  repeated uint64 attached_currency_amounts = 8;
  uint32 read_state = 9;       // 0=unread / 1=read / 2=claimed / 3=expired
}

message MailAllData {
  repeated MailEntry mails = 1;
}
