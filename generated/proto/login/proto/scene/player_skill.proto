syntax = "proto3";
option go_package = "login/proto/scene";


import "proto/db/proto_option.proto";
import "proto/common/base/tip.proto";
import "proto/common/component/comp.proto";
import "proto/common/base/empty.proto";
import "proto/common/component/player_skill_comp.proto";
import "proto/common/component/actor_comp.proto";

option cc_generic_services = true;
option (OptionFileDefaultNode) = NODE_SCENE;

message ReleaseSkillRequest {
  uint32 skill_table_id = 1;
  uint64 target_id = 2;
  Vector3 position = 3;  
  Rotation rotation = 4;
}

message ReleaseSkillResponse {
  TipInfoMessage error_message = 1;  
}

message SkillInterruptedS2C
{
  uint64 entity = 1;
  uint64 target_entity = 2;
  uint32 skill_table_id = 3;
  uint32 reason_code = 4;
  uint64 skill_id = 5;
}

message SkillUsedS2C
{
  uint64 entity = 1;
  repeated uint64 target_entity = 2;
  uint32 skill_table_id = 3;
  Vector3 position = 4;
  uint64 time_stamp = 5;
}

// Get skill list request
message GetSkillListRequest {
}

// Get skill list response
message GetSkillListResponse {
  TipInfoMessage error_message = 1;  
  PlayerSkillListComp skill_list = 2;
}

service SceneSkillClientPlayer { 
  option (OptionIsPlayerService) = true;
  option (OptionIsClientProtocolService) = true;
  
  rpc ReleaseSkill (ReleaseSkillRequest) returns (ReleaseSkillResponse);
  rpc NotifySkillUsed (SkillUsedS2C) returns (Empty);
  rpc NotifySkillInterrupted (SkillInterruptedS2C) returns (Empty);
  rpc GetSkillList (GetSkillListRequest) returns (GetSkillListResponse);
}
