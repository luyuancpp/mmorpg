syntax = "proto3";
package contracts.kafka;

option go_package = "login/proto/contracts/kafka";

// Transport contract for Kafka messages sent to Centre nodes.
// Topic convention: centre-{node_id}.
message CentreCommand {
  enum CommandType {
    DispatchEvent = 0; // Use event_id + payload for in-process dispatch
  }

  CommandType command_type = 1;
  uint64 player_id = 2;
  uint32 target_centre_id = 3;  // Target Centre node ID
  bytes payload = 4;            // Encoded event payload
  string target_instance_id = 5; // Target Centre node instance UUID
  optional uint32 event_id = 6; // Global event id for payload decoding
}
