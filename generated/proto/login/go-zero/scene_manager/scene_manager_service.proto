syntax = "proto3";
package scene_manager;

import "proto/common/base/node.proto";
import "proto/common/base/empty.proto";

option go_package = "scene_manager/scene_manager";

// SceneManager Service: Responsible for scene creation/destruction and Centre -> Scene routing
service SceneManager {
  // Create a scene on a specific node (implemented by the Scene node)
  rpc CreateScene(CreateSceneRequest) returns (CreateSceneResponse) {}

  // Destroy a scene
  rpc DestroyScene(DestroySceneRequest) returns (Empty) {}

  // Centre requests a player to enter a scene, SceneManager routes to the specific Scene node
  rpc EnterSceneByCentre(EnterSceneByCentreRequest) returns (EnterSceneByCentreResponse) {}

  // Centre requests a player to leave a scene (or leave before switching scenes)
  rpc LeaveSceneByCentre(LeaveSceneByCentreRequest) returns (Empty) {}
}

message GateCommand {
  enum CommandType {
    RoutePlayer = 0; // Switch player routing
    KickPlayer = 1;  // Kick offline
    Broadcast = 2;   // Broadcast message
  }
  CommandType command_type = 1;
  uint64 player_id = 2;
  uint32 target_node_id = 3; // Target Scene Node ID (for routing switch)
  uint64 session_id = 4;     // Gate Session ID
  bytes payload = 5;         // Extra data (e.g., broadcast content)
  uint32 target_gate_id = 6;     // Target Gate ID
  string target_instance_id = 7; // Target Gate Instance ID (prevents session conflict)
}

message CreateSceneRequest {
  // Scene config ID
  uint64 scene_conf_id = 1;
  // Optional: Specify creation on a specific Scene node
  string target_node_id = 2;
}

message CreateSceneResponse {
  // Global scene ID (allocated by Scene node)
  uint64 scene_id = 1;
  // ID of the node where it resides
  string node_id = 2;
  // Creation result: 0 for success, non-zero for error code
  uint32 error_code = 3;
  string error_message = 4;
}

message DestroySceneRequest {
  uint64 scene_id = 1;
}

message EnterSceneByCentreRequest {
  // Call from Centre, containing player and session metadata
  uint64 player_id = 1;
  uint64 scene_id = 2; // Target scene
  uint64 centre_node_id = 3; // Source Centre node ID
  uint64 session_id = 4; // Gate session ID (can be 0, indicating hosted)
  string request_id = 5; // Idempotency ID (optional)
  string gate_id = 6;    // Gate Node ID
  string gate_instance_id = 7; // Gate Instance ID (for Kafka message validation)
}

message EnterSceneByCentreResponse {
  uint32 error_code = 1;
  string error_message = 2;
}

message LeaveSceneByCentreRequest {
  uint64 player_id = 1;
  uint64 scene_id = 2;
  uint64 centre_node_id = 3;
  string request_id = 4;
}
