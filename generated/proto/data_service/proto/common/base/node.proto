syntax = "proto3";
package common.base;

option go_package = "data_service/proto/common/base";

enum eNodeType {
  UnknownNodeService     = 0;  // Unknown node service
    SceneNodeService       = 3;  // Scene node service
    GateNodeService        = 4;  // Gate node service
    LoginNodeService       = 5;  // Login node service
    RedisNodeService       = 6;  // Redis node service
    EtcdNodeService        = 7;  // etcd node
    MailNodeService        = 8;  // Mail node service
    ChatNodeService        = 9;  // Chat node service
    TeamNodeService        = 10; // Team node service
    ActivityNodeService    = 11; // Activity node service
    TradeNodeService       = 12; // Trade/auction service
    RankNodeService        = 13; // Ranking service
    TaskNodeService        = 14; // Task/quest service
    GuildNodeService       = 15; // Guild service
    MatchNodeService       = 16; // Match service (e.g. dungeon, PVP)
    AiNodeService          = 17; // AI/NPC control service
    LogNodeService         = 18; // Log collection service
    PaymentNodeService     = 19; // Payment/recharge service
    SecurityNodeService    = 20; // Anti-cheat/security service
    CrossServerNodeService = 21; // Cross-server service (e.g. cross-server battleground)
    AnalyticsNodeService   = 22; // Analytics service
    GmNodeService          = 23; // GM tool service (admin/CS commands)
	PlayerLocatorNodeService		   = 24; // Cross-server player locator service
	SceneManagerNodeService = 25; // Scene manager service (Go-Zero)
	DataServiceNodeService  = 26; // Cross-server data proxy service (Go-Zero)
	FriendNodeService       = 27; // Friend system service (Go-Zero)
	SlgMapNodeService       = 28; // SLG big-world map service (C++)
	SlgBattleNodeService    = 29; // SLG battle simulation worker (C++)
};

enum eSceneNodeType
{
	kMainSceneNode = 0;// Main world scene
	kSceneNode = 1;// Instance scene
	kMainSceneCrossNode = 2;// Cross-server main world scene
	kSceneSceneCrossNode = 3;// Cross-server instance scene
};

// Node protocol type enum
enum eNodeProtocolType {
  PROTOCOL_TCP = 0;
  PROTOCOL_GRPC = 1;
  PROTOCOL_HTTP = 2;
}
