syntax = "proto3";
package storage;

option go_package = "scene_manager";

// Redis: scene:{id}:info
message SceneInfo {
  uint64 scene_id = 1;
  uint64 scene_conf_id = 2;
  string node_id = 3;
  int64 create_time = 4;
  // 1 = main world, 2 = instance
  uint32 scene_type = 5;
}

// Redis: player:{id}:location
message PlayerLocation {
  uint64 scene_id = 1;
  string node_id = 2;
  uint64 update_time = 3;
}
