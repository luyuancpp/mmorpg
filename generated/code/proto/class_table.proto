
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "ClassTableOuterClass";
option java_multiple_files = true;


message ClassTable {
	uint32 id = 1;
	repeated uint32 skill = 2;
}

message ClassTableData {
	repeated ClassTable data = 1;
}