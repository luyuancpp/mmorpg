
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "MainSceneTableOuterClass";
option java_multiple_files = true;


message MainSceneTable {
	uint32 id = 1;
	string nav_bin_file = 2;
}

message MainSceneTableData {
	repeated MainSceneTable data = 1;
}