
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "CooldownTableOuterClass";
option java_multiple_files = true;


message CooldownTable {
	uint32 id = 1;
	uint32 duration = 2;
}

message CooldownTableData {
	repeated CooldownTable data = 1;
}