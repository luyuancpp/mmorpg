
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "ConditionTableOuterClass";
option java_multiple_files = true;


message ConditionTable {
	uint32 id = 1;
	uint32 condition_category = 2;
	repeated uint32 condition1 = 3;
	repeated uint32 condition2 = 4;
	repeated uint32 condition3 = 5;
	repeated uint32 condition4 = 6;
	reserved 7, 8, 9;
	reserved "valid_duration", "quantity_type", "target_count";
	uint32 comparison_op = 10;
}

message ConditionTableData {
	repeated ConditionTable data = 1;
}