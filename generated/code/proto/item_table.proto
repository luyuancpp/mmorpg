
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "ItemTableOuterClass";
option java_multiple_files = true;


message ItemTable {
	uint32 id = 1;
	uint32 max_stack_size = 2;
}

message ItemTableData {
	repeated ItemTable data = 1;
}