
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "MonsterBaseTableOuterClass";
option java_multiple_files = true;


message MonsterBaseTable {
	uint32 id = 1;
}

message MonsterBaseTableData {
	repeated MonsterBaseTable data = 1;
}