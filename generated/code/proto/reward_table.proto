
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "RewardTableOuterClass";
option java_multiple_files = true;


message Rewardreward {
	uint32 reward_item = 1;
	uint32 reward_count = 2;
}

message RewardTable {
	uint32 id = 1;
	repeated Rewardreward reward = 2;
}

message RewardTableData {
	repeated RewardTable data = 1;
}