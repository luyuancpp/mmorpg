
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "SceneTableOuterClass";
option java_multiple_files = true;


message SceneTable {
	uint32 id = 1;
	uint32 dungeon_id = 2;
}

message SceneTableData {
	repeated SceneTable data = 1;
}