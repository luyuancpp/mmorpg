
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "SkillPermissionTableOuterClass";
option java_multiple_files = true;


message SkillPermissionTable {
	uint32 id = 1;
	repeated uint32 skill_type = 2;
}

message SkillPermissionTableData {
	repeated SkillPermissionTable data = 1;
}