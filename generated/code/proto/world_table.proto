
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "WorldTableOuterClass";
option java_multiple_files = true;


message WorldTable {
	uint32 id = 1;
	uint32 scene_id = 2;
}

message WorldTableData {
	repeated WorldTable data = 1;
}