
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "SkillTableOuterClass";
option java_multiple_files = true;


message Skillrequired_item {
	uint32 required_item_type = 1;
	uint64 required_item_value = 2;
}

message Skillrequired_resource {
	uint32 required_resource_type = 1;
	uint32 required_resource_value = 2;
}

message Skillcost_resource {
	uint32 cost_resource_id = 1;
	uint32 cost_resource_cost = 2;
}

message SkillTable {
	uint32 id = 1;
	repeated uint32 skill_type = 2;
	repeated uint32 targeting_mode = 3;
	uint32 require_target = 4;
	uint32 target_status = 5;
	double cast_point = 6;
	double recovery_time = 7;
	uint32 immediate = 8;
	repeated uint32 effect = 9;
	uint32 channel_think = 10;
	uint32 channel_finish = 11;
	uint32 think_interval = 12;
	uint32 channel_time = 13;
	double range = 14;
	double max_range = 15;
	double min_range = 16;
	uint32 self_status = 17;
	uint32 required_status = 18;
	uint32 cooldown_id = 19;
	string damage = 20;
	repeated Skillrequired_item required_item = 21;
	repeated Skillrequired_resource required_resource = 22;
	repeated Skillcost_resource cost_resource = 23;
}

message SkillTableData {
	repeated SkillTable data = 1;
}