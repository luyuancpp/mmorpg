
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "GlobalVariableTableOuterClass";
option java_multiple_files = true;


message GlobalVariableTable {
	uint32 id = 1;
}

message GlobalVariableTableData {
	repeated GlobalVariableTable data = 1;
}