
syntax = "proto3";

option go_package = "generated/pb/table";

option java_package = "com.game.table";
option java_outer_classname = "MirrorTableOuterClass";
option java_multiple_files = true;


message MirrorTable {
	uint32 id = 1;
	uint32 scene_id = 2;
	uint32 main_scene_id = 3;
}

message MirrorTableData {
	repeated MirrorTable data = 1;
}