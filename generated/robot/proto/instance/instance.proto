syntax = "proto3";
option go_package = "robot/proto/instance";



import "proto/common/base/tip.proto";

package instance;

service Instance {
  // Create instance
  rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);
}

message CreateInstanceRequest {
  uint64 player_id = 1;         // Initiating player ID
  uint32 template_id = 2;       // Instance template ID (e.g. dungeon_001)
  repeated uint64 team_member_ids = 3; // Team members (for multiplayer instances)
  map<string, string> metadata = 4;    // Extension fields: e.g. activity ID, time limit
}

message CreateInstanceResponse {
  uint64 instance_id = 1;       // Created instance ID
  int64 expire_time = 2;        // Instance expiry time (Unix timestamp)
  TipInfoMessage error_message = 4;           // Error or success message
}
