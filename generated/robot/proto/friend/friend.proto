syntax = "proto3";
package friendpb;

option go_package = "robot/proto/friend";

import "proto/common/base/tip.proto";

// ── Friend relation data ─────────────────────────────────────────────

enum FriendRequestStatus {
  FRIEND_REQUEST_UNKNOWN  = 0;
  FRIEND_REQUEST_PENDING  = 1;
  FRIEND_REQUEST_ACCEPTED = 2;
  FRIEND_REQUEST_REJECTED = 3;
}

message FriendEntry {
  uint64 friend_player_id = 1;
  int64  since_ms         = 2;  // Friendship start time
  int64  last_active_ms   = 3;
  bool   is_online        = 4;
}

message FriendRequest {
  uint64 from_player_id = 1;
  uint64 to_player_id   = 2;
  int64  request_time_ms = 3;
  FriendRequestStatus status = 4;
}

// ── Request/Response ────────────────────────────────────────────────

message AddFriendRequest {
  uint64 player_id        = 1;
  uint64 target_player_id = 2;
}

message AddFriendResponse {
  TipInfoMessage error_message = 1;
}

message AcceptFriendRequest {
  uint64 player_id        = 1;
  uint64 from_player_id   = 2;
}

message AcceptFriendResponse {
  TipInfoMessage error_message = 1;
}

message RejectFriendRequest {
  uint64 player_id        = 1;
  uint64 from_player_id   = 2;
}

message RejectFriendResponse {
  TipInfoMessage error_message = 1;
}

message RemoveFriendRequest {
  uint64 player_id        = 1;
  uint64 target_player_id = 2;
}

message RemoveFriendResponse {
  TipInfoMessage error_message = 1;
}

message GetFriendListRequest {
  uint64 player_id = 1;
}

message GetFriendListResponse {
  TipInfoMessage error_message = 1;
  repeated FriendEntry friends = 2;
}

message GetPendingRequestsRequest {
  uint64 player_id = 1;
}

message GetPendingRequestsResponse {
  TipInfoMessage error_message = 1;
  repeated FriendRequest requests = 2;
}

// ── Online/Offline notifications ──────────────────────────────────────────

message NotifyOnlineRequest {
  uint64 player_id    = 1;
  uint32 gate_node_id = 2;
}

message NotifyOnlineResponse {}

message NotifyOfflineRequest {
  uint64 player_id = 1;
}

message NotifyOfflineResponse {}

// ── Service definition ─────────────────────────────────────────────────────

service FriendService {
  rpc AddFriend (AddFriendRequest) returns (AddFriendResponse);
  rpc AcceptFriend (AcceptFriendRequest) returns (AcceptFriendResponse);
  rpc RejectFriend (RejectFriendRequest) returns (RejectFriendResponse);
  rpc RemoveFriend (RemoveFriendRequest) returns (RemoveFriendResponse);
  rpc GetFriendList (GetFriendListRequest) returns (GetFriendListResponse);
  rpc GetPendingRequests (GetPendingRequestsRequest) returns (GetPendingRequestsResponse);
  rpc NotifyOnline (NotifyOnlineRequest) returns (NotifyOnlineResponse);
  rpc NotifyOffline (NotifyOfflineRequest) returns (NotifyOfflineResponse);
}
