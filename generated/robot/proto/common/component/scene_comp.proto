syntax = "proto3";
option go_package = "robot/proto/common/component";



message ChangeSceneInfoComp
{

  enum eChangeGsType
  {
      eSameGs = 0;// Same server transfer
      eDifferentGs = 1;// Cross-server transfer
  };
  
  enum eChangeSceneState  
  {
	ePendingLeave = 0;
	eLeaving = 1;
	eWaitingEnter =2;
	eEnterSucceed = 3;
	eGateEnterSucceed = 4;
	eDone = 5;
  };

  
  uint32 scene_confid = 1;
  uint32 guid = 2;// Scene ID
  uint32 dungen_confid = 3;
  uint32 mirror_confid = 4;
  uint32 change_sequence = 5;
  uint32 change_gs_type = 6;
  uint64 change_time = 7;// Timeout means server crash or network delay
  bool ignore_full = 8;// Ignore capacity full
  bool processing = 9;
  uint32 state = 10;
  uint32 from_zone_id = 11;
  uint32 to_zone_id = 12;
  bool is_cross_zone = 13; // Whether cross-zone
}
