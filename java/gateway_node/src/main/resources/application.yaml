# Gateway Node Service
server:
  port: 8081

spring:
  application:
    name: gateway-node
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://localhost:3306/mmorpg?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: appuser
    password: apppass123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

# etcd
etcd:
  endpoints:
    - http://127.0.0.1:2379
  dial-timeout-ms: 5000

# Gate assignment
gate:
  token-secret: "change-me-in-production-use-a-strong-random-key"
  token-ttl-seconds: 300
  discovery-timeout-ms: 5000

# Zone health probe
zone-probe:
  interval-ms: 5000
  gate-stale-threshold-seconds: 30

# CDN
cdn:
  base-url: "https://cdn.example.com"
  sign-ttl-seconds: 3600

# Admin API security
admin:
  api-key: "change-me-in-production"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
