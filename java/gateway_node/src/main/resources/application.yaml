# Gateway Node Service
server:
  port: 8081

spring:
  application:
    name: gateway-node
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://localhost:3306/mmorpg?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: appuser
    password: apppass123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

# etcd
etcd:
  endpoints:
    - http://127.0.0.1:2379
  dial-timeout-ms: 5000

# Gate assignment
gate:
  token-secret: "change-me-in-production-use-a-strong-random-key"
  token-ttl-seconds: 300
  discovery-timeout-ms: 5000
  rate-limit:
    # Master switch — leave OFF until ops verifies the Bucket4j wiring against staging Redis.
    enabled: false
    zone-default-rps: 500
    zone-default-burst: 1000
    ip-rps: 5
    ip-burst: 20
    account-cooldown-ms: 5000
    queue-timeout-ms: 300000
    # Per-zone overrides example (commented):
    # zone-overrides:
    #   1: { rps: 2000, burst: 5000 }
    wave:
      enabled: false
      # Wave clock baseline; 0 = use gateway boot time.
      start-epoch-sec: 0
      schedule: []
      # Example for an open-server day:
      # schedule:
      #   - { offset-sec: 0,   allow-zones: [1, 2] }
      #   - { offset-sec: 30,  allow-zones: [3, 4] }
      #   - { offset-sec: 120, allow-zones: [-1] }   # -1 = all zones

# go-zero login.rpc client
#
# Multi-zone stress 2026-05: each zone runs its own login.rpc instance with
# ListenOn shifted by (zone-1)*1000. dev start-zones launches:
#   z1_login = 127.0.0.1:53000 (base 53000 + 0)
#   z2_login = 127.0.0.1:54000 (base 53000 + 1000)
#   z3_login = 127.0.0.1:55000 (base 53000 + 2000)
#
# Endpoint syntax: "<zoneId>=host:port" pins the channel to a zone (used by
# AssignGate / Login / queue-status, all of which know their target zone).
# Bare "host:port" still works for round-robin fallback (RefreshToken takes
# this path because the access_token doesn't carry a zone). Mixing is allowed.
#
# Why zone-pinning matters: each go-zero login.rpc only watches its own zone's
# gate registrations in etcd. A round-robin client misroutes 2-in-3
# AssignGate calls to a wrong-zone instance and gets "no gate available for
# requested zone" — see docs/design/stress-3zone-2026-05-23-postmortem.md §I.
login:
  grpc:
    endpoints: "1=127.0.0.1:53000,2=127.0.0.1:54000,3=127.0.0.1:55000"
    timeout-ms: 3000
    retry: 1

# Zone health probe
zone-probe:
  interval-ms: 5000
  gate-stale-threshold-seconds: 30

# CDN
cdn:
  base-url: "https://cdn.example.com"
  sign-ttl-seconds: 3600

# Admin API security
admin:
  api-key: "change-me-in-production"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
# CI smoke: this trailing comment exists only to dirty the file enough
