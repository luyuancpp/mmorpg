
syntax = "proto3";

option go_package = "generated/pb/table";

message Testtestobj {
	uint32 testobj_key = 1;
	uint32 testobj_value = 2;
}

message TestTable {
	uint32 id = 1;
	uint32 level = 2;
	repeated uint32 effect = 3;
	map <string, string> tag = 4;
	map <string, string> immune_tag = 5;
	repeated Testtestobj testobj = 6;
}

message TestTableData {
	repeated TestTable data = 1;
}