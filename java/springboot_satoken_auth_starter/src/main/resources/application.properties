# ?????
server.port=${SERVER_PORT:18080}

# ?????
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=MYSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true  # ???SQL??

# H2?????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis??
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=3000
spring.redis.database=0

# Sa-Token??
sa-token.token-name=satoken
sa-token.timeout=604800
sa-token.is-concurrent=false
sa-token.redis=false
sa-token.redis.host=localhost
sa-token.redis.port=6379
sa-token.plugin.jackson=false
sa-token.debug=true

# JustAuth (third-party OAuth) — set client-id/client-secret per provider.
# Prefer environment variables in production:
#   JUSTAUTH_WECHAT_CLIENT_ID, JUSTAUTH_WECHAT_CLIENT_SECRET,
#   JUSTAUTH_QQ_CLIENT_ID,     JUSTAUTH_QQ_CLIENT_SECRET, ...
# Endpoints exposed:
#   GET /auth/login/{provider}      -> redirect to provider auth page
#   GET /auth/callback/{provider}   -> handle redirect, return SA-Token
# Supported provider names: github | wechat (WeChat Open Platform) | qq

# GitHub
justauth.github.client-id=${JUSTAUTH_GITHUB_CLIENT_ID:}
justauth.github.client-secret=${JUSTAUTH_GITHUB_CLIENT_SECRET:}
justauth.github.redirect-uri=${JUSTAUTH_GITHUB_REDIRECT_URI:http://localhost:18080/auth/callback/github}

# WeChat Open Platform (https://open.weixin.qq.com/) — for mobile SDK / PC scan login.
# For 公众号 (MP) use a different request class; see AuthController.
justauth.wechat.client-id=${JUSTAUTH_WECHAT_CLIENT_ID:}
justauth.wechat.client-secret=${JUSTAUTH_WECHAT_CLIENT_SECRET:}
justauth.wechat.redirect-uri=${JUSTAUTH_WECHAT_REDIRECT_URI:http://localhost:18080/auth/callback/wechat}
justauth.wechat.union-id=true

# QQ Connect (https://connect.qq.com/)
justauth.qq.client-id=${JUSTAUTH_QQ_CLIENT_ID:}
justauth.qq.client-secret=${JUSTAUTH_QQ_CLIENT_SECRET:}
justauth.qq.redirect-uri=${JUSTAUTH_QQ_REDIRECT_URI:http://localhost:18080/auth/callback/qq}
justauth.qq.union-id=true