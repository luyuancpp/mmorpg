# Base RPC service config
Name: login.rpc
ListenOn: 127.0.0.1:53000
Timeout: 100000 # Max server-side timeout per request (10s)

# Canonical go-zero RPC registration/discovery settings.
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: login.rpc

# Node config (with login duration limits)
Node:
  ZoneId: 1
  SessionExpireMin: 30 # Session idle timeout. Sized to cover the worst-case
                       # Login→CreatePlayer→EnterGame RPC chain under load.
                       # 1 min was too tight for >1k-robot stress tests,
                       # causing login_session:{sid} to expire mid-flow and
                       # surface as kLoginEnterGameGuid on EnterGame.
  MaxLoginDevices: 3 # Max concurrent login devices per account
  LeaseTTL: 500 # Lease TTL (seconds)
  QueueShardCount: 50 # Queue shard count
  # Login duration limit (max online time per session)
  MaxLoginDuration: 5m # Max login duration (forced logout on timeout)
  LogoutGraceTime: 5s # Grace period to notify player before timeout
  RedisClient:
    Host: 127.0.0.1:6379
    Password: ""
    DB: 0
    DefaultTTL: 24h
    DialTimeout: 3s
    ReadTimeout: 3s
    WriteTimeout: 3s

# Snowflake ID config
Snowflake:
  Epoch: 1721473263000 # Epoch ms for 2024-07-20 15:01:03
  NodeBits: 13
  StepBits: 9

# Distributed lock config
Locker:
  AccountLockTTL: 10 # 10 seconds
  # PlayerLockTTL is the base TTL of the player lock. The EnterGame chain runs
  # a heartbeat goroutine that renews the lock at TTL/3 intervals, so this
  # only needs to survive a short Redis blip plus one heartbeat miss. If the
  # login process crashes mid-chain, the lock auto-expires after ~TTL.
  PlayerLockTTL: 120 # 120 seconds (heartbeat renews every ~40s)
  # 2026-05-25 stress: 30s 在 45k 浪涌下被 Redis QPS 飙升压挤,
  # heartbeat goroutine 一帧调度延迟超过 30s 就丢锁,触发 65k 次
  # `EnterGame lost lock mid-chain`(见 postmortem §L.3)。120s 给
  # heartbeat 4× 容错,稳态 prod 下不会增加锁占用 —— EnterGame
  # 链路正常完成在 ~3s,锁会被显式释放,不依赖 TTL。

# Account config
Account:
  MaxDevicesPerAccount: 3
  CacheExpire: 12h # 12 hours

# Legacy/internal etcd client settings used by custom node helpers.
# Keep Hosts/Key aligned with top-level Etcd to avoid split-brain discovery.
Registry:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: login.rpc
    DialTimeout: 10s

# Timeout config
#
# 2026-05-24 stress: ServiceDiscoveryTimeout used to be 3s (per
# pkg/node/watcher.go default). Under 45k open-server burst the etcd
# kv.Get on the gate-prefix occasionally took >5s when etcd's auto-sync
# was probing stale advertise URLs (see postmortem §3). Bumped to 30s so
# AssignGate fast-path stops surfacing as "no gate available" purely
# because the discovery probe lost the race against the per-call deadline.
# 30s is conservative — production prod-tier latency is sub-100ms; the
# headroom only matters when something is already misbehaving.
Timeouts:
  EtcdDialTimeout: 30s
  ServiceDiscoveryTimeout: 30s
  TaskWaitTimeout: 30s
  # 2026-05-25 stress §M: 5s 在 45k 浪涌下被 db worker 池吞噬,
  # login.EnterGame submit preload → Kafka db_task → MySQL SELECT → ACK
  # 总链路在 partition=5 + 1 worker/zone 配置下 5s 撑不住,触发 47802
  # 次 preload timeout(取代 lock 成为第八轮新瓶颈)。30s 给 6× 容错,
  # 真正长尾的 SELECT 也能完成 ACK;稳态 prod 下应该 100ms 内 ACK,
  # 30s 只在浪涌期生效。后续考虑把 partition 拉到 10/20 并行更多。
  LoginTotalTimeout: 10s # Total login timeout (including Redis load, DB ops, etc.)
  RoleCacheExpire: 24h
  TaskManagerCleanInterval: 5s # Task manager cleanup interval
  TaskBatchExpireTime: 10s # Task batch expiration time
# PlayerLocator gRPC client (discovered via etcd)
PlayerLocatorRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: playerlocator.rpc
  Timeout: 5000
  Middlewares:
    Breaker: false

# SceneManager gRPC client (discovered via etcd)
SceneManagerRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: scenemanagerservice.rpc
  Timeout: 5000
  Middlewares:
    Breaker: false

# Shared HMAC secret for Gate connection tokens.
# Login signs tokens with this secret; Gate verifies them.
# Must match GateTokenSecret in bin/etc/base_deploy_config.yaml.
GateTokenSecret: "change-me-in-production-use-a-strong-random-key"

# Access/refresh token TTL (WeChat/QQ game login style dual-token)
# Access token: used for reconnect without re-auth from third-party (default 2h)
# Refresh token: used to silently renew access token (default 30d)
TokenConfig:
  AccessTokenTTL: 2h
  RefreshTokenTTL: 720h  # 30 days

# Kill switch for the deprecated path "Client → cpp gate (TCP) →
# ClientPlayerLogin.Login" (see ARCH §12). Default true preserves the
# current rollout; flip to false in T+2 once legacy_login_count drops
# below the agreed threshold. When false, the legacy branch returns
# kLoginUnknownError immediately and the new HTTP path
# (POST /api/login on Java Gateway) is unaffected.
LegacyGateLoginEnabled: true

# Prometheus scrape endpoint, exposed by go-zero core/service. Bind to
# 0.0.0.0 in staging/prod so Grafana / Prometheus can reach it; on dev
# we keep it on 127.0.0.1 to avoid leaking metrics outside localhost.
# The login_auth_path_total counter (see deprecation.go) is the
# T+1 exit-criterion signal — Grafana JSON template lives in
# docs/ops/grafana-login-path-deprecation.json.
Prometheus:
  Host: 127.0.0.1
  Port: 9101
  Path: /metrics

# Background goroutine pool for player data preload (Kafka fan-out).
# Size: max concurrent in-flight preload tasks. Submit is non-blocking; if the
#       pool is saturated, the task is dropped with a log and the Scene-side
#       Redis NIL retry compensates (extra latency only, no data loss).
# StatsInterval: periodic pool snapshot log (running/free/cap, drop counter).
#       Set to 0 to disable.
PreloadPool:
  Size: 256
  StatsInterval: 30s

# Dev mode: skip all auth provider validation (use account field directly).
# WARNING: Never enable in production!
# DevSkipAuth: true

# Third-party auth provider config (all optional).
# "password" provider is always available. Others are enabled by uncommenting.
#
# Roll-out order for a new provider (e.g. WeChat):
#   1. Provision AppId/AppSecret on the 3rd-party platform.
#   2. Inject secrets via K8s Secret -> env var; reference with ${VAR} below.
#   3. Uncomment the section and redeploy login.rpc only; gateway/gate need no changes.
#   4. Smoke-test via the Java Gateway POST /api/login with auth_type:"wechat".
#   5. Enable the public /api/login flow for the zone.
AuthProviders:
  SaToken:
    TokenName: satoken
    LoginType: login
    Redis:
      Host: 127.0.0.1:6379
      Password: ""
      DB: 0
      DefaultTTL: 24h
      DialTimeout: 3s
      ReadTimeout: 3s
      WriteTimeout: 3s
#   # WeChat Open Platform (mobile/PC SDK). The client SDK returns an OAuth `code`
#   # (valid ~5 min, one-time-use). LoginRequest{auth_type:"wechat", auth_token:<code>}.
#   # Account identity = "wx_<unionid>" when unionid is available (preferred, stable
#   # across apps under the same Open Platform subject), else "wx_<openid>".
#   WeChat:
#     AppId: "${WECHAT_APP_ID}"
#     AppSecret: "${WECHAT_APP_SECRET}"
#   # QQ Connect (https://connect.qq.com/). The SDK passes `access_token`
#   # (NOT a code) as auth_token. Account identity = "qq_<unionid|openid>".
#   # AppKey is reserved for future server-side WebOAuth flows.
#   QQ:
#     AppId: "${QQ_APP_ID}"
#     AppKey: "${QQ_APP_KEY}"
#   # NetEase URS — provider is currently a stub (see auth-provider-framework.md).
#   NetEase:
#     AppKey: "${NETEASE_APP_KEY}"
#     AppSecret: "${NETEASE_APP_SECRET}"

# AssignGate login queue (Redis ZSET-backed). When Enabled=false (default),
# AssignGate signs and returns a gate token immediately, just like the legacy
# behavior. When Enabled=true:
#   - capacity is computed per-zone from gate PlayerCount + ZoneCapacityOverride
#   - over-capacity callers are enqueued and receive a queue_token; clients
#     poll QueryQueueStatus until the dispatcher promotes them.
#   - reconnect/replace callers (existing PlayerSession) bypass the queue.
#
# Roll-out checklist:
#   1. Deploy with Enabled=false → verify no behavior change.
#   2. Set ZoneCapacityOverride for each live zone (use observed peak * 0.9
#      as the initial value; tune from there).
#   3. Flip Enabled=true on one canary login pod, watch admit/queue counters.
#   4. Roll out fleet-wide.
#
# DispatchInterval too low burns Redis QPS without improving fairness;
# 1s is the sweet spot since gate PlayerCount only refreshes every few
# seconds via etcd.
#
# AdmitTTL must outlive the worst-case "client reads admit token →
# connects to gate" round-trip across mobile networks. 60s is generous.
Queue:
  Enabled: false
  DispatchInterval: 1s
  AdmitTTL: 60s
  QueueEntryTTL: 1h
  SoftCapMultiplier: 1.5
  DefaultRetryAfterMs: 2000
  DispatcherLockTTL: 30s
  DispatcherLockKey: "dispatcher:lock:login_queue"
  # ZoneCapacityOverride pins per-zone admission ceilings. Keys are zone IDs
  # as decimal strings; values are absolute concurrent online player ceilings.
  # When unset for a zone, FreeSlots falls back to PlayerCount * SoftCapMultiplier.
  # ZoneCapacityOverride:
  #   "1": 5000
  #   "2": 5000

# Kafka config
Kafka:
  Brokers:
    - "127.0.0.1:9092"
  GroupID: "db_rpc_consumer_group"
  # Topic is derived from Node.ZoneId at startup (db_task_zone_{ZoneId})
  PartitionCnt: 10  # 2026-05-26 stress §10part: 5->10 to lift db worker pool
  # ⚠️ AUTHORITY: login.go:50 EnsureTopics 启动时按这里调 CreatePartitions
  # 扩 broker。db/etc/db.yaml 的 PartitionCnt 必须与此一致。
  # 2026-05-25 stress §N: db worker count = partition count (per
  # go/db/internal/kafka/key_ordered_consumer.go workers map). 5 partition
  # 在 45k 浪涌下端到端 100-500ms / task,稳态吞吐 50-100/s 远低于浪涌
  # 250/s,触发 87k 次 preload timeout。10 partition 把 worker 池容量
  # 翻倍,期望 preload_to 减半,scene_notified=1 翻倍。
  InitialPartition: 10
  DialTimeout: 10s
  ReadTimeout: 30s
  WriteTimeout: 10s
  RetryMax: 3
  RetryBackoff: 100ms
  ChannelBuffer: 1024
  SyncInterval: 30s
  StatsInterval: 5m
  CompressionType: 0
  Idempotent: true
  MaxOpenRequests: 1
  RetentionMs: 86400000 # Topic retention: 24h (P1 数据安全加固 2026-06-03)
                        # 旧值 300000 (5min) 会让 db service 卡住超过 5 分钟时丢数据,
                        # 24h 给运维处理事故留出充足窗口。详见
                        # docs/notes/redis-oom-data-safety-qa-record.md P1 章节。
