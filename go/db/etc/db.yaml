Name: db.rpc
ListenOn: 0.0.0.0:6000
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: db.rpc
ZoneId: 1
ServerConfig:
  JsonPath: "../../generated/data/mysql_database_table_list.json"
  # Kafka config for the Kafka consumer
  Kafka:
    Brokers:
      - "127.0.0.1:9092" # Kafka broker address
    GroupID: "db_rpc_consumer_group" # Kafka consumer group ID (must be unique)
    # Topic and DBName are derived from ZoneId at startup (db_task_zone_{ZoneId}, zone_{ZoneId}_db)
    PartitionCnt: 10 # ⚠️ MIRROR of go/login/etc/login.yaml Kafka.PartitionCnt.
                     # broker 端真实 partition 数由 login 启动时 EnsureTopics
                     # 决定(login.go:50)。此处只控制 db_rpc consumer worker 数。
                     # 两边必须一致:不一致就 worker 空转或 partition 没人消费。
    IsOfflineExpand: false # Default false; dynamic expansion mode
  Database:
    Hosts: "127.0.0.1:3306"
    User: "root"
    Passwd: "Mmorpg#2026db"
    MaxOpenConn: 10
    MaxIdleConn: 3
    Net: ""
  RedisClient:
    Hosts: "127.0.0.1:6379"
    DefaultTTLSeconds: 3600
    Password: ""
    DB: 0
