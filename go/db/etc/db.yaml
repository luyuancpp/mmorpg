Name: db.rpc
ListenOn: 0.0.0.0:6000
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: db.rpc
ServerConfig:
  JsonPath: "../../generated/data/mysql_database_table_list.json"
  # Kafka config for the Kafka consumer
  Kafka:
    Brokers:
      - "127.0.0.1:9092"  # Kafka broker address
    GroupID: "db_rpc_consumer_group"     # Kafka consumer group ID (must be unique)
    Topic: "db_task_topic"               # Kafka topic name (must match producer topic)
    PartitionCnt: 5                     # Topic partition count (must match Kafka topic)
    IsOfflineExpand: false              # Default false; dynamic expansion mode
  Database:
    Hosts: "127.0.0.1:3306"
    User: "appuser"
    Passwd: "apppass123"
    DBName: "testdb"
    MaxOpenConn: 10
    MaxIdleConn: 3
    Net: ""
  RedisClient:
    Hosts: "127.0.0.1:6379"
    DefaultTTLSeconds: 3600
    Password: ""
    DB: 0