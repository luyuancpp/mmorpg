# Gateway REST API server config
RestConf:
  Name: gateway
  Host: 0.0.0.0
  Port: 8080
  Timeout: 10000

# etcd for Gate node discovery
Etcd:
  Hosts:
    - 127.0.0.1:2379
  DialTimeout: 5s

# Gate assignment settings
Gate:
  TokenSecret: "change-me-in-production-use-a-strong-random-key"
  DiscoveryTimeout: 5s
