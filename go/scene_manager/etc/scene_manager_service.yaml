Name: scenemanagerservice.rpc
ListenOn: 127.0.0.1:60300
Timeout: 5000
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: scenemanagerservice.rpc
Redis:
  Host: 127.0.0.1:6379
  Type: node
  Key: scenemanagerservice

# Zone ID for C++ convention etcd registration (Scene nodes discover SceneManager by this).
ZoneId: 1

# Etcd lease TTL (seconds) for node registration keepalive.
LeaseTTL: 60

Kafka:
  Brokers:
    - 127.0.0.1:9092

# Directory containing exported table JSON files (e.g. World.json).
# World config IDs are loaded from World.json automatically.
# Default: ../../generated/tables (relative to service working directory).
# TableDir: ../../generated/tables

# Instance idle timeout (seconds). An instance with 0 players for longer
# than this is automatically destroyed. Set to 0 to disable auto-destroy.
InstanceIdleTimeoutSeconds: 300

# Mirror idle timeout (seconds). Mirrors are ephemeral world copies: every
# entry resets NPCs/state, so keeping an empty mirror around is pure waste.
# Default 30s absorbs a brief disconnect / loading screen but drops the
# instance quickly. Set to 0 to fall back to InstanceIdleTimeoutSeconds.
MirrorIdleTimeoutSeconds: 30

# How often (seconds) the lifecycle manager scans for idle instances.
InstanceCheckIntervalSeconds: 30

# HMAC-SHA256 secret for signing gate connection tokens during cross-zone redirect.
# Must match the secret configured in Login service and Gate nodes.
GateTokenSecret: "change-me-in-production-use-a-strong-random-key"

# --- World channels -----------------------------------------------------------
#
# Default channel count per world scene. 1 = one channel per map; bump it for
# maps that need multiple parallel copies to split crowds (WoW-style "layers").
WorldChannelCount: 1

# Per-confId channel count override. Keyed by scene_conf_id (matches
# generated/tables/World.json.data[].scene_id). Use it to give hot main
# cities more channels while keeping niche maps at one. Leave commented
# until the live shard is profiled — splitting a map that does not need
# splitting wastes memory and fragments social density.
#
# WorldChannelCountByConfId:
#   1: 4   # capital city (hot)
#   2: 2   # major hub
#   # 16: 1  # any id not listed uses WorldChannelCount (implicit)

# --- Node role routing --------------------------------------------------------
#
# StrictNodeTypeSeparation:
#   true  (production) — main-world creation only lands on nodes whose
#         GameConfig.scene_node_type is kMainSceneNode/kMainSceneCrossNode,
#         and instance creation only on kSceneNode/kSceneSceneCrossNode.
#         Failing a purpose returns ErrNoNodeForPurpose so operators see
#         the misconfiguration immediately.
#   false (dev / single-process) — if no node of the target type is present,
#         the selector falls back to the full zone pool.
# Mirror co-location bypasses this filter regardless — a mirror always
# prefers its source scene's node to reuse resident map/AI/spawn data.
StrictNodeTypeSeparation: true

# --- Composite load score -----------------------------------------------------
#
# Per-node load score = α·scene_count + β·player_count. Lower score = more
# attractive. Defaults favour scene_count (one scene ≈ 100 players) on the
# assumption that an empty scene still burns CPU on tick/AOI scaffolding.
# Tune β up if your scenes are cheap but players are expensive (heavy
# physics, per-player AI, etc.).
NodeLoadWeightSceneCount: 1.0
NodeLoadWeightPlayerCount: 0.01

# Bound on world-channel migrations per rebalance tick. Rebalance runs when
# a world-hosting node joins or leaves the zone. Only empty channels are
# moved (player_count == 0); hot channels stay put. Set 0 to disable
# proactive rebalancing — on-demand lazy-reassign in GetBestWorldChannel
# will still repair mappings to dead nodes.
MaxRebalanceMigrationsPerTick: 10

# Periodic rebalance tick (seconds). Event-driven rebalance fires on node
# join/leave; the ticker catches drift that events miss (hot channel
# drained with no corresponding etcd event). 0 disables periodic passes.
RebalanceCheckIntervalSeconds: 300

# Drop world_channels:* sets for confIds no longer in World.json on every
# fullSync. Refuses to run when the table looks empty (defensive). Disable
# only if you share a Redis cluster across incompatible World.json versions.
CleanupOrphanChannelsOnStartup: true

# --- Observability ------------------------------------------------------------
#
# Prometheus /metrics endpoint. Leave empty to disable (dev default). In
# production, set to an internal port and scrape it via a ServiceMonitor.
# Exposed gauges (all labelled {node_id, zone_id, role}):
#   scene_manager_node_player_count   - online players on the node
#   scene_manager_node_scene_count    - scene entities on the node
#   scene_manager_node_load_score     - composite score used for scheduling
#   scene_manager_nodes_by_role{zone_id,role} - live node count per role
# MetricsListenAddr: ":9150"
