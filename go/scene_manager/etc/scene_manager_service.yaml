Name: scenemanagerservice.rpc
ListenOn: 127.0.0.1:60300
Timeout: 5000
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: scenemanagerservice.rpc
Redis:
  Host: 127.0.0.1:6379
  Type: node
  Key: scenemanagerservice

# Zone ID for C++ convention etcd registration (Scene nodes discover SceneManager by this).
ZoneId: 1

# Etcd lease TTL (seconds) for node registration keepalive.
LeaseTTL: 60

Kafka:
  Brokers:
    - 127.0.0.1:9092
# Grace period (seconds) before removing a scene node that disappeared from etcd.
# During this window, a breakpoint-paused node can re-register without being evicted.
# Set to 0 for immediate removal in production.
NodeRemovalGraceSeconds: 300

# Directory containing exported table JSON files (e.g. World.json).
# World config IDs are loaded from World.json automatically.
# Default: ../../generated/tables (relative to service working directory).
# TableDir: ../../generated/tables

# Instance idle timeout (seconds). An instance with 0 players for longer
# than this is automatically destroyed. Set to 0 to disable auto-destroy.
InstanceIdleTimeoutSeconds: 300

# How often (seconds) the lifecycle manager scans for idle instances.
InstanceCheckIntervalSeconds: 30

# HMAC-SHA256 secret for signing gate connection tokens during cross-zone redirect.
# Must match the secret configured in Login service and Gate nodes.
GateTokenSecret: "change-me-in-production-use-a-strong-random-key"
