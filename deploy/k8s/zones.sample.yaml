zones:
  - name: yesterday
    zoneId: 101
    replicas:
      centre: 1
      gate: 2
      # scene: N  - legacy single-pool (all scene pods run with SceneNodeType=0).
      #           The orchestration script still accepts this field for backwards
      #           compatibility; prefer the split form below when StrictNodeTypeSeparation
      #           is true in scene_manager_service.yaml (recommended in production).
      scene: 4

  - name: today
    zoneId: 102
    replicas:
      centre: 1
      gate: 2
      # Split form: two scene Deployments share one zone namespace and one image.
      #   scene_world    -> Deployment with env SCENE_NODE_TYPE=0, hosts persistent
      #                     main-world channels for all players.
      #   scene_instance -> Deployment with env SCENE_NODE_TYPE=1, hosts副本/战场
      #                     instances created on demand.
      # Recommended baseline: world ~= 1.2x instance, scaling instance first when
      # dungeon/arena traffic rises. Monitor Redis keys
      # scene_nodes:zone:{zoneId}:load and node:{id}:player_count.
      scene_world: 2
      scene_instance: 2
