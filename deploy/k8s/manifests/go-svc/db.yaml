apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    app: db
    tier: go-svc
spec:
  selector:
    app: db
  ports:
    - name: grpc
      port: 6000
      targetPort: 6000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
    tier: go-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
        tier: go-svc
    spec:
      containers:
        - name: db
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          env:
            - name: GOLANG_PROTOBUF_REGISTRATION_CONFLICT
              value: warn
          args: ["-f", "/app/etc/db.yaml"]
          ports:
            - containerPort: 6000
              name: grpc
          readinessProbe:
            grpc:
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 6000
            initialDelaySeconds: 15
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          volumeMounts:
            - name: svc-config
              mountPath: /app/etc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      terminationGracePeriodSeconds: 30
      volumes:
        - name: svc-config
          configMap:
            name: go-svc-db-config
