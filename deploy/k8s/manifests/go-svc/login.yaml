apiVersion: v1
kind: Service
metadata:
  name: login
  labels:
    app: login
    tier: go-svc
spec:
  selector:
    app: login
  ports:
    - name: grpc
      port: 50000
      targetPort: 50000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: login
  labels:
    app: login
    tier: go-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: login
  template:
    metadata:
      labels:
        app: login
        tier: go-svc
    spec:
      containers:
        - name: login
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          args: ["-loginService", "/app/etc/login.yaml"]
          ports:
            - containerPort: 50000
              name: grpc
          volumeMounts:
            - name: svc-config
              mountPath: /app/etc
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: svc-config
          configMap:
            name: go-svc-login-config
