apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
    tier: go-svc
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
    tier: go-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: go-svc
    spec:
      containers:
        - name: gateway
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          env:
            - name: GOLANG_PROTOBUF_REGISTRATION_CONFLICT
              value: warn
          args: ["-f", "/app/etc/gateway.yaml"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: svc-config
              mountPath: /app/etc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: svc-config
          configMap:
            name: go-svc-gateway-config
