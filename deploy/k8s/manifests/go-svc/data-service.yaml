apiVersion: v1
kind: Service
metadata:
  name: data-service
  labels:
    app: data-service
    tier: go-svc
spec:
  selector:
    app: data-service
  ports:
    - name: grpc
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  labels:
    app: data-service
    tier: go-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-service
  template:
    metadata:
      labels:
        app: data-service
        tier: go-svc
    spec:
      containers:
        - name: data-service
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          env:
            - name: GOLANG_PROTOBUF_REGISTRATION_CONFLICT
              value: warn
          args: ["-f", "/app/etc/data_service.yaml"]
          ports:
            - containerPort: 9000
              name: grpc
          volumeMounts:
            - name: svc-config
              mountPath: /app/etc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: svc-config
          configMap:
            name: go-svc-data-service-config
