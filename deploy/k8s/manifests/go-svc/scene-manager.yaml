apiVersion: v1
kind: Service
metadata:
  name: scene-manager
  labels:
    app: scene-manager
    tier: go-svc
spec:
  selector:
    app: scene-manager
  ports:
    - name: grpc
      port: 60000
      targetPort: 60000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scene-manager
  labels:
    app: scene-manager
    tier: go-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scene-manager
  template:
    metadata:
      labels:
        app: scene-manager
        tier: go-svc
    spec:
      containers:
        - name: scene-manager
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          args: ["-f", "/app/etc/scene_manager_service.yaml"]
          ports:
            - containerPort: 60000
              name: grpc
          volumeMounts:
            - name: svc-config
              mountPath: /app/etc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: svc-config
          configMap:
            name: go-svc-scene-manager-config
