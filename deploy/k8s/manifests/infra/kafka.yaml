apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_CLUSTER_ID
              value: "5L6g3nShT-eMCtK--X86sw"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            # --- Retention: broker default is short (5 min) for ephemeral topics.
            # Persistent topics (db_task_zone_*) override via EnsureTopics at service startup.
            - name: KAFKA_LOG_RETENTION_MS
              value: "__KAFKA_LOG_RETENTION_MS__"
            - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
              value: "__KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS__"
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "__KAFKA_LOG_RETENTION_BYTES__"
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "__KAFKA_LOG_SEGMENT_BYTES__"
            # --- JVM heap (production, single-node KRaft)
            - name: KAFKA_HEAP_OPTS
              value: "__KAFKA_HEAP_OPTS__"
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: kafka-data
              mountPath: /tmp/kafka-logs
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
      volumes:
        - name: kafka-data
          emptyDir: {}
