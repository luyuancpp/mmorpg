apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    app: auth
    tier: java-svc
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 5555
      targetPort: 5555
    - name: grpc
      port: 5556
      targetPort: 5556
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
    tier: java-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
        tier: java-svc
    spec:
      containers:
        - name: auth
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5555
              name: http
            - containerPort: 5556
              name: grpc
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          volumeMounts:
            - name: svc-config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: svc-config
          configMap:
            name: java-svc-auth-config
