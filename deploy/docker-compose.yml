version: '3.8'

services:
  # Kafka service
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_HEAP_OPTS=-Xms256m -Xmx512m
      - KAFKA_LOG_RETENTION_MS=60000
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=30000
      - KAFKA_LOG_RETENTION_BYTES=134217728
      - KAFKA_LOG_SEGMENT_BYTES=16777216
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    tmpfs:
      - /tmp/kafka-logs:size=256m
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    user: "root:root"  # Windows permission workaround

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - JAVA_OPTS=-Xms128m -Xmx256m
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    depends_on:
      - kafka

  # Redis service
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # MySQL service
  mysql:
    image: mysql:latest
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Mmorpg#2026db
      - MYSQL_DATABASE=mmorpg
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=apppass123
      - MYSQL_INITDB_SKIP_TZINFO=1  # Avoid Windows timezone config warning
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos service (config center / service registry)
  nacos:
    image: nacos/nacos-server:latest
    container_name: nacos
    ports:
      - "8848:8848"  # Service port
      - "9848:9848"  # Client gRPC port
      - "9849:9849"  # Server gRPC port
    environment:
      - MODE=standalone  # Standalone mode (for dev/test)
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
      - NACOS_AUTH_TOKEN=VGhpc0lzQURldk9ubHlUb2tlblN0cmluZ0Zvck5hY29zMzIh
      - SPRING_DATASOURCE_PLATFORM=mysql  # Optional: enable MySQL-backed persistence
      - MYSQL_SERVICE_HOST=mysql  # Connect to the MySQL container above
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_db  # Dedicated Nacos database
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=Mmorpg#2026db
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
      - MYSQL_DATABASE_NUM=1
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-log:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy  # Wait for MySQL to be healthy before starting
    restart: unless-stopped

  # Etcd service (distributed key-value store)
  etcd:
    image: bitnami/etcd:latest  # Recommended bitnami image, easy to configure
    container_name: etcd
    ports:
      - "2379:2379"  # Client communication port
      - "2380:2380"  # Cluster peer communication port
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes  # Disable auth for dev (must enable in production)
      - ETCD_NAME=default
      - ETCD_INITIAL_CLUSTER=default=http://etcd:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379,http://${HOST_IP:-host.docker.internal}:2379  # Advertised client URLs
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379  # Listen on all interfaces for client connections
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380  # Listen on all interfaces for peer communication
    volumes:
      - etcd-data:/bitnami/etcd/data  # Persistent data volume
    restart: unless-stopped

volumes:
  kafka-data:
  redis-data:
  mysql-data:
  nacos-data:  # Nacos data persistence
  nacos-log:   # Nacos logs
  etcd-data:   # Etcd data persistence