# 游戏场景配置 (main world / 主世界 host)
# 场景节点角色 (eSceneNodeType):
#   0 = kMainSceneNode       主世界宿主 (persistent, pre-created by SceneManager)
#   1 = kSceneNode           副本/战场宿主 (on-demand, lifecycle-managed)
#   2 = kMainSceneNodeCross  主世界跨服宿主
#   3 = kSceneNodeCross      副本跨服宿主
# 环境变量 SCENE_NODE_TYPE 可在 K8s Deployment 层覆盖此值，
# 以便同一镜像在主世界与副本两个 Deployment 中复用。
SceneNodeType: 0
ZoneId: 1

# Zone redis 配置
zoneredis:
  host: "127.0.0.1"        # Redis 服务器地址
  port: 6379               # Redis 服务器端口
  password: "yourpassword" # Redis 密码（如果有的话）
  db: 0                    # 使用的 Redis 数据库编号
  timeout: 3000            # 连接 Redis 的超时时间（毫秒）
  max_connections: 100     # 最大连接数
  retry_interval: 1000     # 连接重试间隔时间（毫秒）
