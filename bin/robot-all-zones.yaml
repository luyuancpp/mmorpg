---
# Zone 1 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: robot-config-stress
  namespace: mmorpg-zone-zone-1
data:
  robot.yaml: |
    login_addr: "login.mmorpg-zone-zone-1.svc.cluster.local:50000"
    gate_addr: "gate.mmorpg-zone-zone-1.svc.cluster.local:10001"
    robot_count: 100
    account_fmt: "robot_z1_%04d"
    password: "123456"
    skill_ids: [1001]
    action_interval: 3
    report_interval: 5
    mode: "stress"
    profile: "stress"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: robot-stress-z1
  namespace: mmorpg-zone-zone-1
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: robot
          image: ghcr.io/luyuancpp/mmorpg-robot:latest
          imagePullPolicy: Never
          command: ["/app/robot", "-c", "/app/etc/robot.yaml"]
          volumeMounts:
            - name: config
              mountPath: /app/etc
      volumes:
        - name: config
          configMap:
            name: robot-config-stress
