# mprocs dashboard for local MMORPG dev.
#
# Install mprocs:
#   winget install mprocs
#
# Run from repo root:
#   mprocs -c tools/dev/mprocs.yaml
#
# Keys:
#   Tab / Shift+Tab  switch process pane
#   r                restart current process
#   R                restart all processes
#   q                quit mprocs (stops child processes)

procs:
  cpp-gate-1:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "cpp-gate"]

  cpp-scene-1:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "cpp-scene"]

  go-db:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-db"]

  go-data-service:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-data-service"]

  go-player-locator:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-player-locator"]

  go-login:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-login"]

  go-scene-manager:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-scene-manager"]

  go-gateway:
    cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "go-gateway"]

  robot:
    cmd: ["pwsh", "-NoProfile", "-Command", "Push-Location robot; go build -o robot.exe .; if ($LASTEXITCODE -eq 0) { ./robot.exe -c etc/robot.yaml } else { Write-Host 'Robot build failed'; pause }"]
    autostart: false

# To scale local node count, duplicate the process entries above, for example:
#   cpp-gate-2:
#     cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "cpp-gate"]
#   cpp-scene-2:
#     cmd: ["pwsh", "-NoProfile", "-File", "tools/scripts/dev_mprocs_proc.ps1", "-Command", "cpp-scene"]
