syntax = "proto3";
package contracts.kafka;

option go_package = "contracts/kafka";

// Transport contract for Kafka messages sent to Gate.
// Keep this schema transport-facing and map it to in-process events in C++.
message GateCommand {
  enum CommandType {
    RoutePlayer = 0; // Switch player routing
    KickPlayer = 1;  // Kick session offline
    Broadcast = 2;   // Broadcast message
  }

  CommandType command_type = 1;
  uint64 player_id = 2;
  uint32 target_node_id = 3;     // Target Scene node ID for routing
  uint64 session_id = 4;         // Gate session ID
  bytes payload = 5;             // Optional extension payload
  uint32 target_gate_id = 6;     // Target Gate ID
  string target_instance_id = 7; // Target Gate instance UUID to avoid stale commands
  optional uint32 event_id = 8;  // Generic in-process event ID for payload decoding
}
