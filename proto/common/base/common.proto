syntax = "proto3";
option go_package = "common/base";



message EndpointComp
{
  string ip = 1;
  uint32 port = 2;
}

message NodeInfo {
  uint32 node_id = 1;
  uint32 node_type = 2;
  uint64 launch_time = 3;
  uint32 scene_node_type = 4;
  EndpointComp endpoint = 5;
  uint32 zone_id = 6;
  uint32 protocol_type = 7; // Node communication protocol type
  string node_uuid = 8;
  uint32 player_count = 9; // Current online player/connection count (for load balancing)
  EndpointComp grpc_endpoint = 10; // gRPC server endpoint (for Go services to connect)
}

message NodeInfoListComp
{
  repeated NodeInfo node_list = 1;
}

message NetworkAddress
{
  string ip = 1;
  uint32 port = 2;
}

