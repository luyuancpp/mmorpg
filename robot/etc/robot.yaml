# Robot load-test configuration
#
# Robot calls HTTP POST /api/assign-gate on the Gateway to get a gate address.

gateway_addr: "http://127.0.0.1:8081" # Gateway HTTP endpoint
zone_id: 1 # target zone (0 = auto-select recommended zone from /api/server-list)
robot_count: 10
account_fmt: "robot_%04d"
password: "123456"
skill_ids: [1001]
action_interval: 3 # seconds between AI actions
report_interval: 5 # seconds between stats prints

# Mode: "stress" (default) = mass concurrent bots doing AI actions
#        "login-test"       = run login test suite (10 scenarios) then exit
mode: "login-test"

# Behavior profile: "stress" (pure skill spam), "fighter", "explorer", "chatter"
# stress = backward-compatible, only casts skills (good for load testing)
# fighter = 60% skill, 25% move, 10% idle, 5% chat
# explorer = 50% move, 20% idle, 20% skill, 10% chat
# chatter = 40% chat, 30% idle, 20% move, 10% skill
profile: "stress"

# Or define custom weights (overrides profile when set):
# custom_weights:
#   cast_skill: 50
#   move: 30
#   idle: 15
#   chat: 5

# LLM-driven behavior (optional).
# Best for 1-10 robots for realistic player simulation. Not for mass load testing.
# Works with OpenAI, Ollama (http://localhost:11434/v1/chat/completions), vLLM, etc.
llm:
  enabled: false
  endpoint: "http://localhost:11434/v1/chat/completions"
  api_key: "" # optional, for OpenAI/Azure
  model: "qwen2" # model name
