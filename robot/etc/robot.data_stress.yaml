# Robot data-consistency stress profile.
#
# Drives repeated login → play → logout cycles per robot and publishes
# per-player expectations to Redis under `verify:enrolled:player_database`
# and `verify:expected:player_database:<player_id>` for the db-side verifier
# (see `go/db/cmd/verifier`).
#
# Run:
#   ./robot -c etc/robot.data_stress.yaml
#
# Then verify (against the same Redis the db service uses):
#   cd go/db && go run ./cmd/verifier -config etc/db.yaml -wait 90s

gateway_addr: "http://127.0.0.1:8081"
zone_id: 1
robot_count: 50
account_fmt: "robot_%04d"
password: "123456"

# Mode and AI behavior. The data-stress mode uses the resolved profile only
# for tick-level actions during each round's play window.
mode: data-stress
profile: stress
action_interval: 1
report_interval: 5

# Tables — used only to auto-resolve skill_ids; safe to leave default.
table_dir: "../generated/tables"

data_stress:
  rounds: 10              # login → play → logout cycles per robot
  play_seconds: 5         # how long the robot stays in-game per round
  verify_redis_addr: "127.0.0.1:6379"
  verify_redis_password: ""
  verify_redis_db: 0
