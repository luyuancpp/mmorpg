name: Include Cleaner CI

on:
  pull_request:
    paths:
      - "cpp/**"
      - "tools/scripts/**"
      - ".github/workflows/include-cleaner-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  include-cleaner:
    name: include-cleaner (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run include-cleaner (clang-tidy)
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/scripts/dev_tools.ps1 -Command iwyu-run -NodePath cpp/nodes/scene,cpp/nodes/gate -IwyuTool clang-tidy -ChangedOnly
