name: Include Cleaner CI

on:
  pull_request:
    paths:
      - "cpp/**"
      - "tools/scripts/**"
      - ".github/workflows/include-cleaner-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Phase 1: figure out which nodes have C/C++ changes ───────────────────
  detect-changes:
    name: Detect changed nodes
    runs-on: ubuntu-latest
    outputs:
      scene: ${{ steps.check.outputs.scene }}
      gate:  ${{ steps.check.outputs.gate }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed nodes
        id: check
        shell: bash
        run: |
          # For PRs use the PR base SHA; for workflow_dispatch run everything.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scene=true" >> "$GITHUB_OUTPUT"
            echo "gate=true"  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"

          # Returns "true" if any C/C++ file changed under $1 or in shared dirs.
          check_node() {
            git diff --name-only "$BASE" "$HEAD" \
              -- "$1" cpp/libs/ tools/scripts/ .github/workflows/ \
              | grep -qE '\.(c|cc|cpp|cxx|h|hpp|hxx)$' \
              && echo "true" || echo "false"
          }

          echo "scene=$(check_node cpp/nodes/scene)" >> "$GITHUB_OUTPUT"
          echo "gate=$(check_node  cpp/nodes/gate)"  >> "$GITHUB_OUTPUT"

  # ── Phase 2: scan helpers (reusable step sequence) ───────────────────────
  # scene and gate run in parallel; each spawns an OS sub-matrix.

  scan-scene:
    name: scene (${{ matrix.os }})
    needs: detect-changes
    if: needs.detect-changes.outputs.scene == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run include-cleaner — scene
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/scripts/dev_tools.ps1 `
            -Command iwyu-run -NodePath cpp/nodes/scene `
            -IwyuTool clang-tidy -ChangedOnly

  scan-gate:
    name: gate (${{ matrix.os }})
    needs: detect-changes
    if: needs.detect-changes.outputs.gate == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-tidy (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run include-cleaner — gate
        shell: pwsh
        run: |
          pwsh -NoProfile -File tools/scripts/dev_tools.ps1 `
            -Command iwyu-run -NodePath cpp/nodes/gate `
            -IwyuTool clang-tidy -ChangedOnly
